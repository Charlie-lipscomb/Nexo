<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  :root { --bg:#0f1020; --grid:#1b1d3a; --snake:#4ade80; --head:#22c55e; --food:#ef4444; --text:#e2e8f0; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    background: radial-gradient(circle at 50% 0%, #1e213f, var(--bg));
    color: var(--text); font-family: system-ui, -apple-system, sans-serif;
  }
  h1 { margin: 0; font-weight: 800; letter-spacing: 1px; }
  #hud { display: flex; gap: 24px; font-size: 18px; }
  #hud b { color: var(--snake); }
  canvas {
    background: var(--grid); border-radius: 12px;
    box-shadow: 0 10px 40px rgba(0,0,0,.5);
    touch-action: none;
  }
  #msg { height: 22px; font-size: 16px; color: #94a3b8; }
  .key { background:#2a2d52; padding:2px 8px; border-radius:6px; font-size:13px; }
</style>
</head>
<body>
  <h1>🐍 Snake</h1>
  <div id="hud"><span>Score: <b id="score">0</b></span><span>Best: <b id="best">0</b></span></div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="msg">Press <span class="key">Space</span> to start</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('msg');

const GRID = 20;               // cells per row/col
const CELL = canvas.width / GRID;
let snake, dir, nextDir, food, score, best = 0, speed, running, dead, loopId;

function reset() {
  snake = [{x: 8, y: 10}, {x: 7, y: 10}, {x: 6, y: 10}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  speed = 130;
  dead = false;
  placeFood();
  scoreEl.textContent = score;
  draw();
}

function placeFood() {
  while (true) {
    const f = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)};
    if (!snake.some(s => s.x === f.x && s.y === f.y)) { food = f; return; }
  }
}

function step() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // collisions
  if (head.x < 0 || head.y < 0 || head.x >= GRID || head.y >= GRID ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    return gameOver();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    if (speed > 60) speed -= 3;        // speed up gradually
    placeFood();
    schedule();                        // re-time loop at new speed
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // subtle grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  for (let i = 1; i < GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
  }
  // food
  drawCell(food.x, food.y, getCSS('--food'), true);
  // snake
  snake.forEach((s, i) => drawCell(s.x, s.y, i === 0 ? getCSS('--head') : getCSS('--snake')));
}

function drawCell(x, y, color, circle) {
  ctx.fillStyle = color;
  const pad = 2;
  if (circle) {
    ctx.beginPath();
    ctx.arc(x*CELL + CELL/2, y*CELL + CELL/2, CELL/2 - pad, 0, Math.PI*2);
    ctx.fill();
  } else {
    roundRect(x*CELL + pad, y*CELL + pad, CELL - pad*2, CELL - pad*2, 4);
    ctx.fill();
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function getCSS(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

function schedule() {
  clearInterval(loopId);
  loopId = setInterval(step, speed);
}

function start() {
  if (running) return;
  if (dead) reset();
  running = true;
  msgEl.textContent = 'Space = pause  •  Arrows / WASD = move';
  schedule();
}

function pause() {
  running = false;
  clearInterval(loopId);
  msgEl.textContent = 'Paused — press Space to resume';
}

function gameOver() {
  running = false; dead = true;
  clearInterval(loopId);
  best = Math.max(best, score);
  bestEl.textContent = best;
  msgEl.textContent = 'Game over! Score ' + score + ' — press R to restart';
}

document.addEventListener('keydown', e => {
  const k = e.key.toLowerCase();
  if (k === ' ') { e.preventDefault(); running ? pause() : start(); return; }
  if (k === 'r') { reset(); start(); return; }
  const moves = {
    arrowup:{x:0,y:-1}, w:{x:0,y:-1},
    arrowdown:{x:0,y:1}, s:{x:0,y:1},
    arrowleft:{x:-1,y:0}, a:{x:-1,y:0},
    arrowright:{x:1,y:0}, d:{x:1,y:0}
  };
  if (moves[k]) {
    e.preventDefault();
    const m = moves[k];
    // prevent reversing directly into yourself
    if (m.x !== -dir.x || m.y !== -dir.y) nextDir = m;
    if (!running && !dead) start();
  }
});

reset();
</script>
</body>
</html>
