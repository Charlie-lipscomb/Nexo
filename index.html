<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Brawl Arena</title>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:#1a1d24;overflow:hidden;font-family:'Courier New',monospace;color:#fff;touch-action:none;user-select:none;-webkit-user-select:none;}
  #game{display:block;width:100%;height:100%;}
  .hud{position:fixed;left:10px;top:10px;font-size:13px;line-height:1.6;pointer-events:none;text-shadow:0 1px 3px #000;}
  .ammo{display:inline-flex;gap:3px;margin-left:4px;vertical-align:middle;}
  .ammo span{width:13px;height:6px;border-radius:2px;background:#333;display:inline-block;transition:background .1s;}
  .ammo span.f{background:#ffd34d;box-shadow:0 0 6px #ffd34d88;}
  .ammo span.reload{background:#888;animation:blink .4s infinite;}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .banner{position:fixed;top:28%;left:0;right:0;text-align:center;font-size:46px;font-weight:bold;text-shadow:0 3px 14px #000,0 0 40px rgba(255,211,77,.4);pointer-events:none;opacity:0;transition:opacity .2s;z-index:9;letter-spacing:2px;}
  .banner.sub{top:38%;font-size:19px;opacity:0;letter-spacing:1px;text-shadow:0 2px 8px #000;}
  .banner.show{opacity:1;}

  /* Streak popup */
  .streak{position:fixed;top:18%;left:0;right:0;text-align:center;font-size:34px;font-weight:bold;pointer-events:none;opacity:0;transition:opacity .15s;z-index:9;text-shadow:0 2px 10px #000;}
  .streak.show{opacity:1;}

  .center{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.85);z-index:10;padding:20px;}
  .center h1{font-size:48px;margin:0 0 6px;letter-spacing:3px;}
  .center p{margin:4px 0;opacity:.85;}
  .chars{display:flex;gap:12px;margin:16px 0;flex-wrap:wrap;justify-content:center;}
  .char{background:#1e222e;border:2px solid #444;border-radius:14px;padding:12px 16px;cursor:pointer;min-width:128px;text-align:center;transition:all .15s;}
  .char:hover{transform:translateY(-2px);box-shadow:0 4px 18px rgba(0,0,0,.5);}
  .char.sel{border-color:#ffcc33;background:#2c2510;}
  .btn{background:#ffcc33;color:#1a1710;border:none;border-radius:12px;padding:13px 28px;font-weight:bold;font-size:20px;cursor:pointer;margin-top:12px;font-family:'Courier New',monospace;letter-spacing:1px;transition:all .15s;}
  .btn:hover{background:#ffe066;transform:scale(1.04);}
  .controls-tip{opacity:.6;font-size:12px;max-width:440px;text-align:center;margin-top:8px;line-height:1.7;}
  /* Minimap */
  #minimap{position:fixed;right:10px;top:10px;width:130px;height:96px;border:1px solid rgba(255,255,255,.25);border-radius:6px;overflow:hidden;pointer-events:none;}
  /* Touch UI */
  .pad{position:fixed;left:20px;bottom:20px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.15);touch-action:none;z-index:5;}
  .stick{position:absolute;left:50%;top:50%;width:58px;height:58px;margin-left:-29px;margin-top:-29px;border-radius:50%;background:rgba(255,255,255,.28);}
  .actions{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;gap:10px;z-index:5;}
  .actionBtn{position:relative;width:76px;height:76px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-weight:bold;font-size:13px;display:flex;align-items:center;justify-content:center;flex-direction:column;font-family:'Courier New',monospace;}
  .actionBtn.heal{background:rgba(62,196,109,.35);}
  .actionBtn.shield{background:rgba(59,156,255,.35);}
  .actionBtn.dash{background:rgba(255,150,50,.35);}
  .badge{position:absolute;top:-6px;right:-6px;background:#222;border-radius:10px;font-size:11px;padding:2px 6px;}
  @media (hover:hover){.pad,.actions{display:none;}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud" id="hud"></div>
<div class="banner" id="banner"></div>
<div class="banner sub" id="bannerSub"></div>
<div class="streak" id="streakEl"></div>
<canvas id="minimap" width="130" height="96"></canvas>

<div class="pad" id="pad"><div class="stick" id="stick"></div></div>
<div class="actions">
  <button class="actionBtn heal" id="bHeal">HEAL<br/>(H)</button>
  <button class="actionBtn shield" id="bShield">SHIELD<br/>(E)<span class="badge" id="shieldBadge">✓</span></button>
  <button class="actionBtn dash" id="bDash">DASH<br/>(F)<span class="badge" id="dashBadge">✓</span></button>
</div>

<div class="center" id="menu">
  <h1>⚔️ BRAWL ARENA</h1>
  <p id="menuSub">Pick a brawler. Survive the waves.</p>
  <div class="chars" id="charPick"></div>
  <button class="btn" id="startBtn">START</button>
  <p class="controls-tip">WASD / joystick to move • Mouse / drag right to aim &amp; fire • H to heal (open ground only!) • E to shield (10s CD) • F to dash • Hide in 🌳 bushes • Cover behind walls</p>
</div>

<script>
(() => {
  const cvs = document.getElementById('game');
  const ctx = cvs.getContext('2d');
  const miniCvs = document.getElementById('minimap');
  const miniCtx = miniCvs.getContext('2d');
  const hud = document.getElementById('hud');
  const menu = document.getElementById('menu');
  const menuSub = document.getElementById('menuSub');
  const charPick = document.getElementById('charPick');
  const startBtn = document.getElementById('startBtn');
  const banner = document.getElementById('banner');
  const bannerSub = document.getElementById('bannerSub');
  const streakEl = document.getElementById('streakEl');

  // ── Resize ──
  function resize(){
    cvs.width = innerWidth * devicePixelRatio;
    cvs.height = innerHeight * devicePixelRatio;
    cvs.style.width = innerWidth+'px';
    cvs.style.height = innerHeight+'px';
    ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  }
  addEventListener('resize', resize); resize();

  const WORLD = {w:1800, h:1300};
  const TILE = 60;

  // ── Characters ──
  const CHARACTERS = [
    { id:'shelly', name:'Buckshot', emoji:'🔫', color:'#ff8a5b', hp:115, speed:172, fireRate:0.52, dmg:14, bulletSpeed:530, spread:0.30, pellets:5, range:390, ammo:3, reload:1.5, desc:'Shotgun · close-range burst' },
    { id:'colt',   name:'Ranger',  emoji:'🎯', color:'#ffd34d', hp:85,  speed:205, fireRate:0.18, dmg:12, bulletSpeed:740, spread:0.03, pellets:1, range:660, ammo:6, reload:1.0, desc:'Rifle · fast & accurate' },
    { id:'bull',   name:'Tank',    emoji:'💪', color:'#a06bff', hp:170, speed:148, fireRate:0.68, dmg:23, bulletSpeed:490, spread:0.16, pellets:4, range:350, ammo:2, reload:1.7, desc:'Heavy · tanky brawler' },
  ];
  let selected = 0;

  function renderChars(){
    charPick.innerHTML='';
    CHARACTERS.forEach((c,i)=>{
      const d = document.createElement('div');
      d.className = 'char'+(i===selected?' sel':'');
      d.innerHTML = `<div style="font-size:30px">${c.emoji}</div><div style="color:${c.color};font-weight:bold;font-size:15px">${c.name}</div><div style="font-size:11px;opacity:.75;margin-top:3px">HP ${c.hp} · DMG ${c.dmg} · AMMO ${c.ammo}</div><div style="font-size:10px;opacity:.6;margin-top:4px">${c.desc}</div>`;
      d.style.borderColor = i===selected ? c.color : '#444';
      d.onclick = ()=>{ selected=i; renderChars(); };
      charPick.appendChild(d);
    });
  }
  renderChars();

  // ── Seeded RNG ──
  function mulberry32(a){
    return function(){
      a|=0; a=a+0x6D2B79F5|0;
      let t=Math.imul(a^a>>>15,1|a);
      t=t+Math.imul(t^t>>>7,61|t)^t;
      return((t^t>>>14)>>>0)/4294967296;
    };
  }

  // ── Themes ──
  const THEMES = [
    { name:'Cactus Canyon', floor:'#3a2a1c', grid:'rgba(255,255,255,.04)', wall:'#7a5230', wallTop:'#a06b3e', bush:'#3e6b2e', bushDark:'#274d1f' },
    { name:'Frost Bay',     floor:'#1c2a3a', grid:'rgba(255,255,255,.05)', wall:'#3a5d80', wallTop:'#5c89b3', bush:'#2e6b5a', bushDark:'#1f4d44' },
    { name:'Neon Alleys',   floor:'#1f1a2e', grid:'rgba(255,255,255,.05)', wall:'#5c3a80', wallTop:'#8c5cb3', bush:'#6b2e6b', bushDark:'#4d1f4d' },
    { name:'Jungle Pit',    floor:'#1c2a1c', grid:'rgba(255,255,255,.05)', wall:'#4d6b30', wallTop:'#6b8c44', bush:'#3e8c2e', bushDark:'#27661f' },
    { name:'Ash Wastes',    floor:'#2a2420', grid:'rgba(255,255,255,.04)', wall:'#6b4a3a', wallTop:'#9c6a52', bush:'#5a4a2a', bushDark:'#3d3018' },
  ];

  // ── Level builder ──
  function buildLevel(idx){
    const theme = THEMES[(idx-1) % THEMES.length];
    const rng = mulberry32(1000 + idx*97);
    const walls = [], bushes = [];

    // Border
    walls.push({x:0,y:0,w:WORLD.w,h:TILE});
    walls.push({x:0,y:WORLD.h-TILE,w:WORLD.w,h:TILE});
    walls.push({x:0,y:0,w:TILE,h:WORLD.h});
    walls.push({x:WORLD.w-TILE,y:0,w:TILE,h:WORLD.h});

    const wallCount = 14 + idx*2;
    for(let i=0;i<wallCount;i++){
      const w=(1+Math.floor(rng()*3))*TILE;
      const h=(1+Math.floor(rng()*2))*TILE;
      const x=TILE*2+Math.floor(rng()*((WORLD.w-w-TILE*4)/TILE))*TILE;
      const y=TILE*2+Math.floor(rng()*((WORLD.h-h-TILE*4)/TILE))*TILE;
      if(Math.hypot(x+w/2-WORLD.w/2,y+h/2-WORLD.h/2)<200) continue;
      walls.push({x,y,w,h});
    }

    const bushCount = 16+Math.floor(rng()*6);
    for(let i=0;i<bushCount;i++){
      const w=(1+Math.floor(rng()*2))*TILE;
      const h=(1+Math.floor(rng()*2))*TILE;
      const x=TILE*2+Math.floor(rng()*((WORLD.w-w-TILE*4)/TILE))*TILE;
      const y=TILE*2+Math.floor(rng()*((WORLD.h-h-TILE*4)/TILE))*TILE;
      if(Math.hypot(x+w/2-WORLD.w/2,y+h/2-WORLD.h/2)<110) continue;
      bushes.push({x,y,w,h});
    }

    return {theme, walls, bushes, waves: 4+Math.floor(idx*0.5), idx};
  }

  // ── Input ──
  const keys = {};
  addEventListener('keydown',e=>{
    keys[e.key.toLowerCase()]=true;
    if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
    if(e.key==='1'||e.key==='2'||e.key==='3'){selected=parseInt(e.key)-1;renderChars();}
  });
  addEventListener('keyup',e=>{ keys[e.key.toLowerCase()]=false; });

  const pad = document.getElementById('pad'), stick = document.getElementById('stick');
  let joy = {x:0,y:0,active:false};
  function padTouch(t){
    const r=pad.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    let dx=t.clientX-cx, dy=t.clientY-cy;
    const max=r.width/2-10;
    const m=Math.hypot(dx,dy);
    if(m>max){dx=dx/m*max;dy=dy/m*max;}
    stick.style.transform=`translate(${dx}px,${dy}px)`;
    joy.x=dx/max; joy.y=dy/max; joy.active=true;
  }
  pad.addEventListener('touchstart',e=>{padTouch(e.changedTouches[0]);},{passive:true});
  pad.addEventListener('touchmove', e=>{padTouch(e.changedTouches[0]);},{passive:true});
  pad.addEventListener('touchend',  ()=>{joy={x:0,y:0,active:false};stick.style.transform='translate(0,0)';},{passive:true});

  document.getElementById('bHeal').addEventListener('touchstart',e=>{e.preventDefault();startHeal();});
  document.getElementById('bHeal').addEventListener('touchend',  e=>{e.preventDefault();stopHeal();});
  document.getElementById('bShield').addEventListener('touchstart',e=>{e.preventDefault();activateShield();});
  document.getElementById('bDash').addEventListener('touchstart',e=>{e.preventDefault();activateDash();});

  let aim = {x:innerWidth*0.75, y:innerHeight/2};
  let aimingTouch = null, mouseFire = false, touchFire = false;

  cvs.addEventListener('mousemove',e=>{aim.x=e.clientX;aim.y=e.clientY;});
  cvs.addEventListener('mousedown',e=>{aim.x=e.clientX;aim.y=e.clientY;mouseFire=true;});
  cvs.addEventListener('mouseup',  ()=>mouseFire=false);
  cvs.addEventListener('touchstart',e=>{
    for(const t of e.changedTouches){
      if(t.clientX>innerWidth*0.45){aimingTouch=t.identifier;aim.x=t.clientX;aim.y=t.clientY;touchFire=true;}
    }
  },{passive:true});
  cvs.addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){if(t.identifier===aimingTouch){aim.x=t.clientX;aim.y=t.clientY;}}
  },{passive:true});
  cvs.addEventListener('touchend',e=>{
    for(const t of e.changedTouches){if(t.identifier===aimingTouch){aimingTouch=null;touchFire=false;}}
  },{passive:true});

  addEventListener('keydown',e=>{
    if(!state||state.over) return;
    const k=e.key.toLowerCase();
    if(k==='h') startHeal();
    if(k==='e') activateShield();
    if(k==='f') activateDash();
  });
  addEventListener('keyup',e=>{ if(!state) return; if(e.key.toLowerCase()==='h') stopHeal(); });

  // ── State ──
  let state = null;
  let screenShake = {t:0, intensity:0};

  function addShake(intensity){
    screenShake.t = 0.18;
    screenShake.intensity = Math.max(screenShake.intensity, intensity);
  }

  function newGame(){
    const ch = CHARACTERS[selected];
    state = {
      t:0, score:0, kills:0, streak:0, streakTimer:0,
      level:1, wave:0, waveInProgress:false, betweenTimer:3,
      player:{
        x:WORLD.w/2, y:WORLD.h/2, r:18,
        hp:ch.hp, maxHp:ch.hp, char:ch,
        cool:0, ammo:ch.ammo, maxAmmo:ch.ammo, reloadT:0,
        healing:false,
        shieldActive:false, shieldHits:0, shieldCool:0,
        dashCool:0, dashing:false, dashVx:0, dashVy:0, dashT:0,
        speedBoost:0, dmgBoost:0,
        angle:0, lastFired:-99, lastHit:-99, muzzle:0,
      },
      bullets:[], enemies:[], powerups:[], particles:[], texts:[],
      cam:{x:0,y:0},
      over:false,
    };
    Object.assign(state, buildLevel(1));
    menu.style.display='none';
    showBanner(`Level 1: ${state.theme.name}`, 'Get ready!');
    state.betweenTimer=3;
    last=performance.now();
    requestAnimationFrame(loop);
  }
  startBtn.onclick=newGame;

  function showBanner(text,sub='',dur=2400){
    banner.textContent=text;
    bannerSub.textContent=sub;
    banner.classList.add('show'); bannerSub.classList.add('show');
    clearTimeout(showBanner._t);
    showBanner._t=setTimeout(()=>{banner.classList.remove('show');bannerSub.classList.remove('show');},dur);
  }

  let streakTimer2=0;
  function showStreak(n){
    const msgs=['','','DOUBLE KILL!','TRIPLE KILL!','QUAD KILL!','PENTA KILL!'];
    const colors=['','','#ffd34d','#ff8a5b','#e85b5b','#ff44ff'];
    const label = n>=msgs.length ? `${n}x KILL STREAK!` : msgs[n];
    const col   = n>=colors.length ? '#ff44ff' : colors[n];
    if(!label) return;
    streakEl.textContent=label;
    streakEl.style.color=col;
    streakEl.classList.add('show');
    clearTimeout(showStreak._t);
    showStreak._t=setTimeout(()=>streakEl.classList.remove('show'),1400);
  }

  function nextWave(){
    state.wave++;
    if(state.wave>state.waves){
      state.level++;
      Object.assign(state, buildLevel(state.level));
      state.wave=0; state.waveInProgress=false; state.betweenTimer=4;
      state.player.hp=Math.min(state.player.maxHp, state.player.hp+40);
      state.player.ammo=state.player.maxAmmo;
      state.player.x=WORLD.w/2; state.player.y=WORLD.h/2;
      showBanner(`Level ${state.level}: ${state.theme.name}`,'+ 40 HP · Ammo refilled');
      return;
    }
    state.waveInProgress=true;
    const count=2+state.wave+Math.floor(state.level*0.8);
    spawnEnemies(count);
    showBanner(`Wave ${state.wave} / ${state.waves}`, `${count} enemies incoming`);
  }

  // ── Enemy AI types ──
  // role: 'grunt' | 'flanker' | 'sniper' | 'elite'
  function spawnEnemies(n){
    for(let i=0;i<n;i++){
      let x,y,tries=0;
      do{
        const ang=Math.random()*Math.PI*2;
        const dist=400+Math.random()*340;
        x=state.player.x+Math.cos(ang)*dist;
        y=state.player.y+Math.sin(ang)*dist;
        x=Math.max(80,Math.min(WORLD.w-80,x));
        y=Math.max(80,Math.min(WORLD.h-80,y));
        tries++;
      } while(tries<20 && circleHitsWall(x,y,20));

      const lvl=state.level-1;
      const roll=Math.random();
      let role;
      if(state.level<=1 || roll<0.45)        role='grunt';
      else if(roll<0.70)                      role='flanker';
      else if(roll<0.88)                      role='sniper';
      else                                    role='elite';

      const base={
        x, y, r:18, aggro:0,
        seesPlayer:false, lastKnownX:WORLD.w/2, lastKnownY:WORLD.h/2,
        stateTimer:0, aiState:'approach',
        cover:null, coverTimer:0,
        flankAngle: Math.random()*Math.PI*2,
        groupId: Math.floor(i/3), // for loose formations
      };

      switch(role){
        case 'grunt':
          Object.assign(base,{
            hp:60+Math.random()*30+lvl*22+state.wave*8,
            speed:100+Math.random()*30+lvl*8,
            cool:Math.random()*0.6,
            dmg:8+Math.random()*6+lvl*2,
            fireRate:0.85+Math.random()*0.5,
            bulletSpeed:390+Math.random()*100,
            range:420,
            r:18,
            color:'#5be0a8', role,
          }); break;
        case 'flanker':
          Object.assign(base,{
            hp:50+lvl*18+state.wave*6,
            speed:145+Math.random()*20+lvl*10,
            cool:Math.random()*0.3,
            dmg:7+lvl*1.5,
            fireRate:0.55+Math.random()*0.3,
            bulletSpeed:460+Math.random()*80,
            range:380,
            r:16,
            color:'#f06292', role,
          }); break;
        case 'sniper':
          Object.assign(base,{
            hp:45+lvl*14+state.wave*5,
            speed:72+lvl*5,
            cool:Math.random()*1.2,
            dmg:18+lvl*3,
            fireRate:1.8+Math.random()*0.5,
            bulletSpeed:820,
            range:680,
            r:17,
            color:'#7ab9ff', role,
          }); break;
        case 'elite':
          Object.assign(base,{
            hp:140+lvl*40+state.wave*16,
            speed:115+lvl*6,
            cool:Math.random()*0.5,
            dmg:14+lvl*3,
            fireRate:0.60,
            bulletSpeed:430,
            range:500,
            r:24,
            color:'#ffcc33', role,
            isBoss:true,
          }); break;
      }
      base.maxHp=base.hp;
      state.enemies.push(base);
    }
  }

  function spawnPowerup(ox,oy){
    const types=[
      {k:'heal',  color:'#3ec46d', label:'❤'},
      {k:'speed', color:'#ffd34d', label:'⚡'},
      {k:'dmg',   color:'#e85b5b', label:'💥'},
      {k:'ammo',  color:'#e8c25b', label:'▣'},
    ];
    const t=types[Math.floor(Math.random()*types.length)];
    let x=ox||0,y=oy||0;
    if(!ox){
      let tries=0;
      do{
        x=100+Math.random()*(WORLD.w-200);
        y=100+Math.random()*(WORLD.h-200);
        tries++;
      } while(tries<20 && circleHitsWall(x,y,16));
    }
    state.powerups.push({x,y,r:16,...t,life:22});
  }

  // ── Actions ──
  function startHeal(){
    if(!state||state.over) return;
    const p=state.player;
    // *** Cannot heal in a bush ***
    if(inBush(p.x,p.y)){
      state.texts.push({x:p.x,y:p.y-40,vy:-28,life:1.2,text:'No healing in bushes!',color:'#ff8a5b'});
      return;
    }
    if(p.hp>=p.maxHp) return;
    p.healing=true;
  }
  function stopHeal(){if(state) state.player.healing=false;}

  function activateShield(){
    if(!state||state.over) return;
    const p=state.player;
    if(p.shieldCool>0||p.shieldActive||p.healing) return;
    p.shieldActive=true; p.shieldHits=0; p.shieldCool=10;
  }

  function activateDash(){
    if(!state||state.over) return;
    const p=state.player;
    if(p.dashCool>0||p.dashing||p.healing) return;
    // dash in movement direction or aim direction
    let dx=0,dy=0;
    if(keys['w']) dy-=1; if(keys['s']) dy+=1;
    if(keys['a']) dx-=1; if(keys['d']) dx+=1;
    if(joy.active){dx+=joy.x;dy+=joy.y;}
    if(dx===0&&dy===0){dx=Math.cos(p.angle);dy=Math.sin(p.angle);}
    const m=Math.hypot(dx,dy)||1;
    p.dashVx=dx/m*700; p.dashVy=dy/m*700;
    p.dashing=true; p.dashT=0.18; p.dashCool=4;
    // trail burst
    for(let k=0;k<8;k++){
      state.particles.push({x:p.x,y:p.y,vx:(Math.random()-.5)*160+(-dx/m*80),vy:(Math.random()-.5)*160+(-dy/m*80),life:.35,color:p.char.color,r:3});
    }
  }

  // ── Collision helpers ──
  function rectCircle(rx,ry,rw,rh,cx,cy,cr){
    const nx=Math.max(rx,Math.min(cx,rx+rw));
    const ny=Math.max(ry,Math.min(cy,ry+rh));
    return Math.hypot(cx-nx,cy-ny)<cr;
  }
  function circleHitsWall(cx,cy,cr){
    for(const w of state.walls){if(rectCircle(w.x,w.y,w.w,w.h,cx,cy,cr)) return true;}
    return false;
  }
  function tryMove(ent,mx,my){
    if(mx!==0){const nx=Math.max(ent.r,Math.min(WORLD.w-ent.r,ent.x+mx)); if(!circleHitsWall(nx,ent.y,ent.r)) ent.x=nx;}
    if(my!==0){const ny=Math.max(ent.r,Math.min(WORLD.h-ent.r,ent.y+my)); if(!circleHitsWall(ent.x,ny,ent.r)) ent.y=ny;}
  }
  function inBush(cx,cy){
    for(const b of state.bushes){if(cx>=b.x&&cx<=b.x+b.w&&cy>=b.y&&cy<=b.y+b.h) return true;}
    return false;
  }
  function losBlocked(ax,ay,bx,by){
    const dx=bx-ax, dy=by-ay, d=Math.hypot(dx,dy);
    const steps=Math.max(4,Math.floor(d/24));
    for(let i=1;i<steps;i++){
      const t=i/steps, x=ax+dx*t, y=ay+dy*t;
      for(const w of state.walls){if(x>=w.x&&x<=w.x+w.w&&y>=w.y&&y<=w.y+w.h) return true;}
    }
    return false;
  }

  // Find nearest wall/cover position for an enemy relative to player
  function findCover(e, px, py){
    // Sample candidate positions near walls, prefer those that block LOS to player
    let best=null, bestScore=-Infinity;
    for(const w of state.walls){
      const candidates=[
        {x:w.x-e.r-4, y:w.y+w.h/2},
        {x:w.x+w.w+e.r+4, y:w.y+w.h/2},
        {x:w.x+w.w/2, y:w.y-e.r-4},
        {x:w.x+w.w/2, y:w.y+w.h+e.r+4},
      ];
      for(const c of candidates){
        if(c.x<TILE||c.x>WORLD.w-TILE||c.y<TILE||c.y>WORLD.h-TILE) continue;
        if(circleHitsWall(c.x,c.y,e.r+2)) continue;
        const blocked=losBlocked(c.x,c.y,px,py);
        const distE=Math.hypot(c.x-e.x,c.y-e.y);
        const distP=Math.hypot(c.x-px,c.y-py);
        const score=(blocked?200:0) - distE*0.4 + distP*0.1;
        if(score>bestScore){bestScore=score;best=c;}
      }
    }
    return best;
  }

  // ── Firing ──
  function tryFire(p){
    if(p.healing||p.dashing) return;
    if(p.ammo<=0||p.cool>0) return;
    const ch=p.char, dmgMul=p.dmgBoost>0?1.6:1;
    for(let i=0;i<ch.pellets;i++){
      const a=p.angle+(Math.random()-.5)*ch.spread;
      state.bullets.push({
        x:p.x+Math.cos(a)*p.r, y:p.y+Math.sin(a)*p.r,
        vx:Math.cos(a)*ch.bulletSpeed, vy:Math.sin(a)*ch.bulletSpeed,
        life:ch.range/ch.bulletSpeed, dmg:ch.dmg*dmgMul, from:'p', color:ch.color, r:5,
      });
    }
    p.cool=ch.fireRate; p.ammo--; p.lastFired=state.t; p.muzzle=0.08;
    if(p.reloadT<=0) p.reloadT=ch.reload;
  }

  function enemyFire(e,px,py){
    const spread = e.role==='sniper' ? 0.02 : e.role==='flanker' ? 0.12 : 0.10;
    const a=Math.atan2(py-e.y,px-e.x)+(Math.random()-.5)*spread;
    state.bullets.push({
      x:e.x+Math.cos(a)*e.r, y:e.y+Math.sin(a)*e.r,
      vx:Math.cos(a)*e.bulletSpeed, vy:Math.sin(a)*e.bulletSpeed,
      life:e.range/e.bulletSpeed, dmg:e.dmg, from:'e', color:e.color, r:e.role==='sniper'?7:5,
    });
    e.cool=e.fireRate;
  }

  // ── Main loop ──
  let last=performance.now();
  function loop(){
    const now=performance.now();
    let dt=(now-last)/1000; if(dt>0.05) dt=0.05;
    last=now;
    update(dt);
    render();
    if(!state.over) requestAnimationFrame(loop);
  }

  function update(dt){
    const s=state, p=s.player;
    s.t+=dt;

    // Streak timer
    if(s.streak>0){
      s.streakTimer-=dt;
      if(s.streakTimer<=0) s.streak=0;
    }

    // Screen shake decay
    if(screenShake.t>0){screenShake.t=Math.max(0,screenShake.t-dt); if(screenShake.t<=0) screenShake.intensity=0;}

    // ─ Dash physics ─
    if(p.dashing){
      p.dashT-=dt;
      const nx=Math.max(p.r,Math.min(WORLD.w-p.r,p.x+p.dashVx*dt));
      const ny=Math.max(p.r,Math.min(WORLD.h-p.r,p.y+p.dashVy*dt));
      if(!circleHitsWall(nx,p.y,p.r)) p.x=nx;
      if(!circleHitsWall(p.x,ny,p.r)) p.y=ny;
      state.particles.push({x:p.x,y:p.y,vx:0,vy:0,life:.2,color:p.char.color,r:4});
      if(p.dashT<=0) p.dashing=false;
    }

    // ─ Healing (immobile, not in bushes) ─
    if(p.healing){
      // Abort if player wandered into bush (shouldn't happen but safety check)
      if(inBush(p.x,p.y)){
        p.healing=false;
        state.texts.push({x:p.x,y:p.y-40,vy:-28,life:1.2,text:'No healing in bushes!',color:'#ff8a5b'});
      } else {
        p.hp=Math.min(p.maxHp, p.hp+30*dt);
        if(p.hp>=p.maxHp) p.healing=false;
      }
    } else if(!p.dashing){
      // Movement
      let mx=0,my=0;
      if(keys['w']) my-=1; if(keys['s']) my+=1;
      if(keys['a']) mx-=1; if(keys['d']) mx+=1;
      if(joy.active){mx+=joy.x;my+=joy.y;}
      const m=Math.hypot(mx,my);
      if(m>0){mx/=m;my/=m;}
      const spd=p.char.speed*(p.speedBoost>0?1.55:1);
      tryMove(p,mx*spd*dt,my*spd*dt);
    }

    // Aim
    if(!p.healing){
      let ax=0,ay=0;
      if(keys['arrowup']) ay-=1; if(keys['arrowdown']) ay+=1;
      if(keys['arrowleft']) ax-=1; if(keys['arrowright']) ax+=1;
      if(ax||ay) p.angle=Math.atan2(ay,ax);
      else {
        const sx=aim.x+s.cam.x, sy=aim.y+s.cam.y;
        p.angle=Math.atan2(sy-p.y, sx-p.x);
      }
    }

    // Boost timers
    if(p.speedBoost>0) p.speedBoost=Math.max(0,p.speedBoost-dt);
    if(p.dmgBoost>0)   p.dmgBoost  =Math.max(0,p.dmgBoost-dt);
    if(p.shieldCool>0) p.shieldCool=Math.max(0,p.shieldCool-dt);
    if(p.dashCool>0)   p.dashCool  =Math.max(0,p.dashCool-dt);
    if(p.muzzle>0)     p.muzzle    =Math.max(0,p.muzzle-dt);

    // Reload
    if(p.ammo<p.maxAmmo){
      p.reloadT-=dt;
      if(p.reloadT<=0){p.ammo++;p.reloadT=p.ammo<p.maxAmmo?p.char.reload:0;}
    }

    // Fire
    p.cool-=dt;
    const wantFire=(!p.healing)&&(mouseFire||touchFire||keys[' ']);
    if(wantFire) tryFire(p);

    // ─ Bullets ─
    for(let i=s.bullets.length-1;i>=0;i--){
      const b=s.bullets[i];
      const oldX=b.x, oldY=b.y;
      b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
      if(Math.random()<0.35) s.particles.push({x:oldX,y:oldY,vx:0,vy:0,life:.12,color:b.color,r:2});
      if(b.life<=0||b.x<0||b.y<0||b.x>WORLD.w||b.y>WORLD.h){s.bullets.splice(i,1);continue;}

      let hitWall=false;
      for(const w of s.walls){if(b.x>=w.x&&b.x<=w.x+w.w&&b.y>=w.y&&b.y<=w.y+w.h){hitWall=true;break;}}
      if(hitWall){
        for(let k=0;k<5;k++) s.particles.push({x:b.x,y:b.y,vx:(Math.random()-.5)*140,vy:(Math.random()-.5)*140,life:.28,color:'#fff',r:2});
        s.bullets.splice(i,1); continue;
      }

      if(b.from==='p'){
        let hit=false;
        for(const e of s.enemies){
          if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+b.r){
            e.hp-=b.dmg; e.aggro=5; e.aiState='approach';
            e.lastKnownX=p.x; e.lastKnownY=p.y;
            for(let k=0;k<4;k++) s.particles.push({x:b.x,y:b.y,vx:(Math.random()-.5)*110,vy:(Math.random()-.5)*110,life:.3,color:e.color,r:2});
            s.texts.push({x:b.x,y:b.y,vy:-45,life:.55,text:Math.round(b.dmg),color:'#fff'});
            hit=true; break;
          }
        }
        if(hit){s.bullets.splice(i,1);continue;}
      } else {
        if(!p.dashing && Math.hypot(b.x-p.x,b.y-p.y)<p.r+b.r){
          let dmg=b.dmg;
          if(p.shieldActive){
            if(p.shieldHits===0) dmg*=0.2;
            p.shieldHits++;
            if(p.shieldHits>=2) p.shieldActive=false;
          }
          p.hp-=dmg; p.lastHit=s.t;
          addShake(4+dmg*0.2);
          s.texts.push({x:b.x,y:b.y,vy:-40,life:.55,text:Math.round(dmg),color:'#ff8a8a'});
          for(let k=0;k<4;k++) s.particles.push({x:b.x,y:b.y,vx:(Math.random()-.5)*110,vy:(Math.random()-.5)*110,life:.3,color:'#ff5a5a',r:2});
          s.bullets.splice(i,1);
          if(p.hp<=0){p.hp=0;gameOver();}
          continue;
        }
      }
    }

    // ─ Enemy AI ─
    const playerHidden = inBush(p.x,p.y) && (s.t-p.lastFired>0.6) && (s.t-p.lastHit>1.8);

    for(let i=s.enemies.length-1;i>=0;i--){
      const e=s.enemies[i];
      const dx=p.x-e.x, dy=p.y-e.y, d=Math.hypot(dx,dy);

      // Vision
      const canSee=!playerHidden && d<(e.role==='sniper'?660:540) && !losBlocked(e.x,e.y,p.x,p.y);
      if(canSee){
        e.aggro=4.5;
        e.seesPlayer=true;
        e.lastKnownX=p.x; e.lastKnownY=p.y;
      } else {
        e.seesPlayer=false;
      }
      e.aggro=Math.max(0,e.aggro-dt);
      const knows=e.aggro>0;
      e.stateTimer=Math.max(0,e.stateTimer-dt);
      e.coverTimer=Math.max(0,e.coverTimer-dt);

      // ─ AI State Machine ─
      if(knows){
        const hp_pct = e.hp/e.maxHp;

        // Low HP → seek cover
        if(hp_pct<0.30 && e.aiState!=='cover' && e.stateTimer<=0){
          const cv=findCover(e,e.lastKnownX,e.lastKnownY);
          if(cv){ e.cover=cv; e.aiState='cover'; e.stateTimer=3.5+Math.random()*2; }
        }
        // After covering, re-engage
        if(e.aiState==='cover' && e.stateTimer<=0){
          e.aiState='approach'; e.cover=null;
        }

        // Role-specific behaviours
        if(e.role==='flanker'){
          // Flank: orbit player at medium distance
          if(e.stateTimer<=0){
            e.flankAngle+=((Math.random()<0.5?1:-1)*Math.PI*0.5);
            e.stateTimer=1.4+Math.random()*0.8;
          }
          if(e.aiState!=='cover'){
            const tgt_d=200+Math.random()*60;
            const tx=e.lastKnownX+Math.cos(e.flankAngle)*tgt_d;
            const ty=e.lastKnownY+Math.sin(e.flankAngle)*tgt_d;
            const fdx=tx-e.x, fdy=ty-e.y, fm=Math.hypot(fdx,fdy)||1;
            tryMove(e,(fdx/fm)*e.speed*dt,(fdy/fm)*e.speed*dt);
          }
        } else if(e.role==='sniper'){
          // Sniper: stay far, find angle with wall cover
          const ideal_d=450+Math.random()*100;
          if(e.aiState!=='cover'){
            if(d<ideal_d-60){
              tryMove(e,(-dx/d)*e.speed*dt,(-dy/d)*e.speed*dt); // back away
            } else if(d>ideal_d+80){
              tryMove(e,(dx/d)*e.speed*dt,(dy/d)*e.speed*dt); // approach
            } else {
              // Strafe sideways
              const perp_x=-dy/d, perp_y=dx/d;
              const sd=(Math.sin(s.t*0.7+i)>0?1:-1);
              tryMove(e,perp_x*sd*e.speed*0.7*dt, perp_y*sd*e.speed*0.7*dt);
            }
          }
        } else if(e.role==='elite'){
          // Elite: charges to melee range, then bursts
          if(e.aiState!=='cover'){
            if(d>130){
              tryMove(e,(dx/d)*e.speed*1.1*dt,(dy/d)*e.speed*1.1*dt);
            } else {
              // Strafe tight circles at close range
              const perp_x=-dy/d, perp_y=dx/d;
              tryMove(e,perp_x*e.speed*0.8*dt, perp_y*e.speed*0.8*dt);
            }
          }
        } else {
          // Grunt: direct approach with some spread
          if(e.aiState==='cover' && e.cover){
            const cdx=e.cover.x-e.x, cdy=e.cover.y-e.y, cm=Math.hypot(cdx,cdy)||1;
            if(cm>12) tryMove(e,(cdx/cm)*e.speed*dt,(cdy/cm)*e.speed*dt);
          } else if(knows){
            const spread_x=Math.sin(s.t*1.5+i*2.1)*30;
            const spread_y=Math.cos(s.t*1.5+i*2.1)*30;
            const tx=e.lastKnownX+spread_x - e.x;
            const ty=e.lastKnownY+spread_y - e.y;
            const tm=Math.hypot(tx,ty)||1;
            const dir=d>230?1:(d<140?-0.4:0);
            if(dir!==0) tryMove(e,(tx/tm)*e.speed*dir*dt,(ty/tm)*e.speed*dir*dt);
          }
        }

        // Cover movement
        if(e.aiState==='cover' && e.cover){
          const cdx=e.cover.x-e.x, cdy=e.cover.y-e.y, cm=Math.hypot(cdx,cdy)||1;
          if(cm>12) tryMove(e,(cdx/cm)*e.speed*dt,(cdy/cm)*e.speed*dt);
        }

        // Investigate last known position if lost sight
        if(!e.seesPlayer && knows && e.aiState==='approach'){
          const ilx=e.lastKnownX-e.x, ily=e.lastKnownY-e.y, im=Math.hypot(ilx,ily)||1;
          if(im>40) tryMove(e,(ilx/im)*e.speed*0.55*dt,(ily/im)*e.speed*0.55*dt);
        }

      } else {
        // Wander slightly
        const wa=Math.sin(s.t*0.5+i*1.7)*0.8;
        tryMove(e,Math.cos(wa)*e.speed*0.15*dt, Math.sin(wa)*e.speed*0.15*dt);
      }

      // Enemy/enemy separation
      for(const e2 of s.enemies){
        if(e2===e) continue;
        const ex=e.x-e2.x, ey=e.y-e2.y, ed=Math.hypot(ex,ey);
        if(ed>0&&ed<e.r+e2.r+2){const k=(e.r+e2.r-ed+2)*0.5; tryMove(e,(ex/ed)*k,(ey/ed)*k);}
      }

      // Fire
      e.cool-=dt;
      const shootDist = e.role==='sniper' ? e.range : e.range;
      if(e.cool<=0 && canSee && d<shootDist){
        // Only shoot from cover position if sniper and behind wall
        const coverFireOk = !(e.aiState==='cover' && e.cover && Math.hypot(e.x-e.cover.x,e.y-e.cover.y)>50);
        if(coverFireOk) enemyFire(e,p.x,p.y);
      }

      // Death
      if(e.hp<=0){
        s.enemies.splice(i,1);
        s.kills++; s.score+=e.isBoss?350:100;
        addShake(e.isBoss?8:3);
        s.streak++;
        s.streakTimer=3.5;
        showStreak(s.streak);
        const blast=e.isBoss?20:12;
        for(let k=0;k<blast;k++) s.particles.push({x:e.x,y:e.y,vx:(Math.random()-.5)*200,vy:(Math.random()-.5)*200,life:.7,color:e.color,r:e.isBoss?4:3});
        s.texts.push({x:e.x,y:e.y,vy:-55,life:.9,text:e.isBoss?'+350':'+100',color:'#ffd34d'});
        if(Math.random()<(e.isBoss?0.6:0.2)) spawnPowerup(e.x,e.y);
      }
    }

    // Wave progression
    if(s.waveInProgress){
      if(s.enemies.length===0){
        s.waveInProgress=false; s.betweenTimer=3.5;
        if(s.wave>=s.waves){
          showBanner(`Level ${s.level} cleared!`,'Preparing next level…');
        } else {
          showBanner(`Wave ${s.wave} cleared!`,`Next wave in 3…`);
        }
      }
    } else {
      s.betweenTimer-=dt;
      if(s.betweenTimer<=0) nextWave();
    }

    // Powerups
    if(s.powerups.length<5 && Math.random()<dt*0.15) spawnPowerup();
    for(let i=s.powerups.length-1;i>=0;i--){
      const pu=s.powerups[i];
      pu.life-=dt;
      if(pu.life<=0){s.powerups.splice(i,1);continue;}
      if(Math.hypot(pu.x-p.x,pu.y-p.y)<pu.r+p.r){ applyPowerup(pu); s.powerups.splice(i,1); }
    }

    // Particles
    for(let i=s.particles.length-1;i>=0;i--){
      const pa=s.particles[i];
      pa.x+=(pa.vx||0)*dt; pa.y+=(pa.vy||0)*dt; pa.life-=dt;
      if(pa.life<=0) s.particles.splice(i,1);
    }
    for(let i=s.texts.length-1;i>=0;i--){
      const tx=s.texts[i];
      tx.y+=(tx.vy||0)*dt; tx.life-=dt;
      if(tx.life<=0) s.texts.splice(i,1);
    }

    // Camera
    s.cam.x=p.x-innerWidth/2;
    s.cam.y=p.y-innerHeight/2;
    s.cam.x=Math.max(0,Math.min(WORLD.w-innerWidth,s.cam.x));
    s.cam.y=Math.max(0,Math.min(WORLD.h-innerHeight,s.cam.y));
  }

  function applyPowerup(pu){
    const p=state.player;
    if(pu.k==='heal'){ p.hp=Math.min(p.maxHp,p.hp+50); state.texts.push({x:p.x,y:p.y-34,vy:-32,life:.9,text:'+50 HP',color:'#3ec46d'}); }
    if(pu.k==='speed'){ p.speedBoost=6; state.texts.push({x:p.x,y:p.y-34,vy:-32,life:.9,text:'SPEED',color:'#ffd34d'}); }
    if(pu.k==='dmg'){   p.dmgBoost=8;  state.texts.push({x:p.x,y:p.y-34,vy:-32,life:.9,text:'DMG UP',color:'#e85b5b'}); }
    if(pu.k==='ammo'){  p.ammo=p.maxAmmo; p.reloadT=0; state.texts.push({x:p.x,y:p.y-34,vy:-32,life:.9,text:'AMMO',color:'#e8c25b'}); }
    state.score+=25;
  }

  function gameOver(){
    state.over=true;
    setTimeout(()=>{
      menu.style.display='flex';
      menu.querySelector('h1').textContent='☠️ K.O.';
      menuSub.textContent=`Lvl ${state.level} · Wave ${state.wave} · Score ${state.score} · Kills ${state.kills}`;
      startBtn.textContent='PLAY AGAIN';
    },700);
  }

  // ── Render ──
  function render(){
    const s=state; if(!s) return;
    const cam=s.cam, theme=s.theme;

    // Screen shake offset
    let shakeX=0, shakeY=0;
    if(screenShake.t>0){
      const si=screenShake.intensity*(screenShake.t/0.18);
      shakeX=(Math.random()-.5)*si*2;
      shakeY=(Math.random()-.5)*si*2;
    }

    ctx.clearRect(0,0,innerWidth,innerHeight);
    ctx.save();
    ctx.translate(shakeX,shakeY);

    // Floor
    ctx.fillStyle=theme.floor;
    ctx.fillRect(-cam.x,-cam.y,WORLD.w,WORLD.h);

    // Grid
    ctx.strokeStyle=theme.grid; ctx.lineWidth=1;
    for(let gx=0;gx<=WORLD.w;gx+=TILE){ctx.beginPath();ctx.moveTo(gx-cam.x,-cam.y);ctx.lineTo(gx-cam.x,WORLD.h-cam.y);ctx.stroke();}
    for(let gy=0;gy<=WORLD.h;gy+=TILE){ctx.beginPath();ctx.moveTo(-cam.x,gy-cam.y);ctx.lineTo(WORLD.w-cam.x,gy-cam.y);ctx.stroke();}

    // Walls
    for(const w of s.walls){
      ctx.fillStyle=theme.wall;
      ctx.fillRect(w.x-cam.x,w.y-cam.y,w.w,w.h);
      ctx.fillStyle=theme.wallTop;
      ctx.fillRect(w.x-cam.x,w.y-cam.y,w.w,7);
      ctx.strokeStyle='rgba(0,0,0,.4)'; ctx.lineWidth=2;
      ctx.strokeRect(w.x-cam.x,w.y-cam.y,w.w,w.h);
    }

    // Bushes
    for(const b of s.bushes){
      ctx.fillStyle=theme.bushDark;
      ctx.fillRect(b.x-cam.x,b.y-cam.y,b.w,b.h);
      ctx.fillStyle=theme.bush;
      const cols=Math.ceil(b.w/22), rows=Math.ceil(b.h/22);
      for(let cx=0;cx<cols;cx++){
        for(let cy=0;cy<rows;cy++){
          ctx.beginPath();
          ctx.arc(b.x-cam.x+cx*22+14,b.y-cam.y+cy*22+14,13,0,Math.PI*2);
          ctx.fill();
        }
      }
      // "No heal" indicator: show a subtle red cross on each bush
      ctx.strokeStyle='rgba(255,80,80,.25)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(b.x-cam.x+b.w/2-6,b.y-cam.y+b.h/2);ctx.lineTo(b.x-cam.x+b.w/2+6,b.y-cam.y+b.h/2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(b.x-cam.x+b.w/2,b.y-cam.y+b.h/2-6);ctx.lineTo(b.x-cam.x+b.w/2,b.y-cam.y+b.h/2+6); ctx.stroke();
    }

    // Powerups
    for(const pu of s.powerups){
      const x=pu.x-cam.x, y=pu.y-cam.y;
      // Pulse ring
      const pulse=0.5+0.5*Math.sin(s.t*4);
      ctx.strokeStyle=pu.color; ctx.lineWidth=2; ctx.globalAlpha=0.3+0.3*pulse;
      ctx.beginPath(); ctx.arc(x,y,pu.r+8+pulse*4,0,Math.PI*2); ctx.stroke();
      ctx.globalAlpha=1;
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(Math.sin(s.t*3)*0.14);
      ctx.shadowBlur=14; ctx.shadowColor=pu.color;
      ctx.fillStyle=pu.color;
      ctx.beginPath(); ctx.arc(0,0,pu.r,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#fff'; ctx.font='bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(pu.label,0,1);
      ctx.restore();
    }

    // Enemies
    for(const e of s.enemies){
      const x=e.x-cam.x, y=e.y-cam.y;
      const inB=inBush(e.x,e.y);
      ctx.globalAlpha=inB?0.3:1;
      // Elite glow
      if(e.isBoss){
        ctx.shadowBlur=18; ctx.shadowColor=e.color;
      }
      ctx.fillStyle=e.color;
      ctx.beginPath(); ctx.arc(x,y,e.r,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.45)'; ctx.lineWidth=2; ctx.stroke();
      ctx.shadowBlur=0;
      // Role indicators
      if(e.role==='elite'){
        ctx.strokeStyle='#fff'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(x,y,e.r+4,0,Math.PI*2); ctx.stroke();
      }
      ctx.globalAlpha=inB?0.5:1;
      // HP bar
      const barW=e.r*2+8;
      ctx.fillStyle='rgba(0,0,0,.6)'; ctx.fillRect(x-barW/2,y-e.r-12,barW,5);
      const hpColor=e.hp/e.maxHp>0.5?'#5be0a8':'#f06292';
      ctx.fillStyle=hpColor; ctx.fillRect(x-barW/2,y-e.r-12,barW*(e.hp/e.maxHp),5);
      // Role badge
      const roleIcons={grunt:'●',flanker:'◆',sniper:'▲',elite:'★'};
      ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='9px monospace'; ctx.textAlign='center';
      ctx.fillText(roleIcons[e.role]||'●',x,y-e.r-16);
      ctx.globalAlpha=1;
    }

    // Bullets
    for(const b of s.bullets){
      ctx.fillStyle=b.color;
      ctx.shadowBlur=7; ctx.shadowColor=b.color;
      ctx.beginPath(); ctx.arc(b.x-cam.x,b.y-cam.y,b.r,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }

    // Player
    const p=s.player;
    const px=p.x-cam.x, py=p.y-cam.y;
    const hidden=inBush(p.x,p.y)&&(s.t-p.lastFired>0.6)&&(s.t-p.lastHit>1.8);

    // Dash afterimage
    if(p.dashing){
      ctx.globalAlpha=0.3;
      ctx.fillStyle=p.char.color;
      ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }

    // Aim reticle
    if(!p.healing){
      const range=p.char.range;
      const rx=px+Math.cos(p.angle)*range, ry=py+Math.sin(p.angle)*range;
      ctx.strokeStyle='rgba(255,255,255,.15)'; ctx.setLineDash([5,9]); ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(rx,ry); ctx.stroke();
      ctx.setLineDash([]);
      const sp=p.char.spread;
      ctx.fillStyle='rgba(255,255,255,.04)';
      ctx.beginPath(); ctx.moveTo(px,py); ctx.arc(px,py,range,p.angle-sp,p.angle+sp); ctx.closePath(); ctx.fill();
      ctx.fillStyle=p.ammo>0?p.char.color:'#666';
      ctx.shadowBlur=8; ctx.shadowColor=p.char.color;
      ctx.beginPath(); ctx.arc(rx,ry,5,0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }

    // Muzzle flash
    if(p.muzzle>0){
      const mx=px+Math.cos(p.angle)*(p.r+6), my=py+Math.sin(p.angle)*(p.r+6);
      ctx.fillStyle='#fff7c2'; ctx.shadowBlur=22; ctx.shadowColor='#ffd34d';
      ctx.beginPath(); ctx.arc(mx,my,9*(p.muzzle/0.08),0,Math.PI*2); ctx.fill();
      ctx.shadowBlur=0;
    }

    // Player body
    ctx.globalAlpha=hidden?0.42:1;
    if(p.dashing){ctx.shadowBlur=16; ctx.shadowColor=p.char.color;}
    ctx.fillStyle=p.char.color;
    ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.stroke();
    ctx.shadowBlur=0;
    ctx.globalAlpha=1;

    // Direction dot
    ctx.fillStyle='rgba(0,0,0,.5)';
    ctx.beginPath();
    ctx.arc(px+Math.cos(p.angle)*(p.r-4),py+Math.sin(p.angle)*(p.r-4),4,0,Math.PI*2);
    ctx.fill();

    // Heal ring
    if(p.healing){
      ctx.strokeStyle='#3ec46d'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(px,py,p.r+10+Math.sin(s.t*8)*2,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='#3ec46d'; ctx.font='bold 12px monospace'; ctx.textAlign='center';
      ctx.fillText('HEALING',px,py-36);
    }
    // Shield ring
    if(p.shieldActive){
      const scol=p.shieldHits===0?'#3b9cff':'#a0d4ff';
      ctx.strokeStyle=scol; ctx.lineWidth=p.shieldHits===0?5:2;
      ctx.shadowBlur=10; ctx.shadowColor=scol;
      ctx.beginPath(); ctx.arc(px,py,p.r+8,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;
    }
    // HP bar
    ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(px-28,py-34,56,7);
    ctx.fillStyle=p.hp/p.maxHp>0.5?'#5be0a8':'#f06292';
    ctx.fillRect(px-28,py-34,56*(p.hp/p.maxHp),7);
    if(hidden){
      ctx.fillStyle='#3ec46d'; ctx.font='bold 10px monospace'; ctx.textAlign='center';
      ctx.fillText('HIDDEN',px,py-40);
    }

    // Particles
    for(const pa of s.particles){
      ctx.fillStyle=pa.color; ctx.globalAlpha=Math.max(0,pa.life)*2;
      ctx.beginPath(); ctx.arc(pa.x-cam.x,pa.y-cam.y,pa.r||3,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
    // Floating texts
    ctx.font='bold 13px monospace'; ctx.textAlign='center';
    for(const tx of s.texts){
      ctx.globalAlpha=Math.min(1,tx.life*1.8);
      ctx.fillStyle=tx.color; ctx.fillText(tx.text,tx.x-cam.x,tx.y-cam.y);
      ctx.globalAlpha=1;
    }

    // Wave timer bar (top center)
    if(!s.waveInProgress&&s.betweenTimer>0){
      const pct=s.betweenTimer/(s.wave===0?3:3.5);
      const bw=200;
      ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(innerWidth/2-bw/2,6,bw,8);
      ctx.fillStyle='#ffd34d'; ctx.fillRect(innerWidth/2-bw/2,6,bw*pct,8);
      ctx.font='10px monospace'; ctx.textAlign='center'; ctx.fillStyle='#fff';
      ctx.fillText(`NEXT WAVE IN ${Math.ceil(s.betweenTimer)}s`,innerWidth/2,28);
    }

    ctx.restore(); // end shake

    // ── Minimap ──
    const MW=miniCvs.width, MH=miniCvs.height;
    const scaleX=MW/WORLD.w, scaleY=MH/WORLD.h;
    miniCtx.fillStyle='rgba(15,15,20,.85)';
    miniCtx.fillRect(0,0,MW,MH);
    // Walls
    miniCtx.fillStyle='rgba(120,120,140,.6)';
    for(const w of s.walls) miniCtx.fillRect(w.x*scaleX,w.y*scaleY,w.w*scaleX,w.h*scaleY);
    // Bushes
    miniCtx.fillStyle='rgba(60,120,50,.5)';
    for(const b of s.bushes) miniCtx.fillRect(b.x*scaleX,b.y*scaleY,b.w*scaleX,b.h*scaleY);
    // Enemies
    for(const e of s.enemies){
      miniCtx.fillStyle=e.color;
      miniCtx.beginPath();
      miniCtx.arc(e.x*scaleX,e.y*scaleY,e.isBoss?4:2.5,0,Math.PI*2);
      miniCtx.fill();
    }
    // Powerups
    miniCtx.fillStyle='#ffd34d';
    for(const pu of s.powerups){
      miniCtx.beginPath();
      miniCtx.arc(pu.x*scaleX,pu.y*scaleY,2,0,Math.PI*2);
      miniCtx.fill();
    }
    // Player
    miniCtx.fillStyle='#fff';
    miniCtx.beginPath();
    miniCtx.arc(p.x*scaleX,p.y*scaleY,3.5,0,Math.PI*2);
    miniCtx.fill();
    // Camera viewport
    miniCtx.strokeStyle='rgba(255,255,255,.3)'; miniCtx.lineWidth=1;
    miniCtx.strokeRect(cam.x*scaleX,cam.y*scaleY,innerWidth*scaleX,innerHeight*scaleY);

    // ── HUD ──
    let ammoBar='<span class="ammo">';
    for(let i=0;i<p.maxAmmo;i++){
      const isReloading=p.ammo<p.maxAmmo && i===p.ammo;
      ammoBar+=`<span class="${i<p.ammo?'f':isReloading?'reload':''}"></span>`;
    }
    ammoBar+='</span>';

    const healthPct=p.hp/p.maxHp;
    const healthColor=healthPct>0.5?'#5be0a8':healthPct>0.25?'#ffd34d':'#ff5a5a';

    hud.innerHTML=
      `<b style="color:${p.char.color}">${p.char.name}</b>`+
      ` &nbsp; <span style="color:${healthColor}">HP ${Math.ceil(p.hp)}/${p.maxHp}</span>`+
      `<br/>Ammo ${ammoBar}${p.ammo<p.maxAmmo?` <span style="opacity:.6;font-size:11px">reloading…</span>`:''}`+
      `<br/>Lvl <b>${s.level}</b> (${s.theme.name}) · Wave <b>${Math.max(1,s.wave)}/${s.waves}</b>`+
      `<br/>Score ${s.score} · Kills ${s.kills}`+
      `<br/>Shield: ${p.shieldActive?(p.shieldHits===0?'<span style="color:#3b9cff">ACTIVE</span>':'<span style="color:#a0d4ff">WEAK</span>'):(p.shieldCool>0?`<span style="color:#888">CD ${p.shieldCool.toFixed(1)}s</span>`:'<span style="color:#3b9cff">ready [E]</span>')}`+
      ` &nbsp; Dash: ${p.dashing?'<span style="color:#ff9632">DASHING</span>':(p.dashCool>0?`<span style="color:#888">CD ${p.dashCool.toFixed(1)}s</span>`:'<span style="color:#ff9632">ready [F]</span>')}`+
      (p.speedBoost>0?`<br/>⚡ Speed ${p.speedBoost.toFixed(1)}s`:'')+
      (p.dmgBoost>0?`<br/>💥 Damage ${p.dmgBoost.toFixed(1)}s`:'')+
      (hidden?`<br/><span style="color:#3ec46d">🌳 Hidden</span>`:'')+
      (p.healing?`<br/><span style="color:#3ec46d">⊕ Healing…</span>`:'')+
      (s.streak>1?`<br/><span style="color:#ffd34d">🔥 ${s.streak}x streak</span>`:'');

    const sb=document.getElementById('shieldBadge');
    if(sb) sb.textContent=p.shieldCool>0?Math.ceil(p.shieldCool):'✓';
    const db=document.getElementById('dashBadge');
    if(db) db.textContent=p.dashCool>0?Math.ceil(p.dashCool):'✓';
  }
})();
</script>
</body>
</html>
