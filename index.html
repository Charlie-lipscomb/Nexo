<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Brawl Arena</title>
<style>
  html,body{margin:0;height:100%;background:#1a1d24;overflow:hidden;font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:#fff;touch-action:none;user-select:none;-webkit-user-select:none;}
  #game{display:block;width:100%;height:100%;}
  .hud{position:fixed;left:10px;top:10px;font-size:14px;line-height:1.4;pointer-events:none;text-shadow:0 1px 2px #000;}
  .center{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;background:rgba(0,0,0,.7);z-index:10;}
  .center h1{font-size:42px;margin:0 0 8px;}
  .center p{margin:4px 0;}
  .chars{display:flex;gap:12px;margin:16px 0;}
  .char{background:#2a2f3a;border:2px solid #444;border-radius:12px;padding:10px 14px;cursor:pointer;min-width:120px;text-align:center;}
  .char.sel{border-color:#ffcc33;background:#3a2f1a;}
  .btn{background:#ffcc33;color:#222;border:none;border-radius:10px;padding:12px 22px;font-weight:bold;font-size:18px;cursor:pointer;margin-top:10px;}
  /* Touch UI */
  .pad{position:fixed;left:20px;bottom:20px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);touch-action:none;z-index:5;}
  .stick{position:absolute;left:50%;top:50%;width:60px;height:60px;margin-left:-30px;margin-top:-30px;border-radius:50%;background:rgba(255,255,255,.3);}
  .actions{position:fixed;right:20px;bottom:20px;display:flex;flex-direction:column;gap:10px;z-index:5;}
  .actionBtn{width:78px;height:78px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#fff;font-weight:bold;font-size:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;}
  .actionBtn.fire{background:#e85b5b;}
  .actionBtn.heal{background:#3ec46d;}
  .actionBtn.shield{background:#3b9cff;}
  .actionBtn:disabled{opacity:.4;}
  .badge{position:absolute;top:-6px;right:-6px;background:#222;border-radius:10px;font-size:11px;padding:2px 6px;}
  @media (hover:hover){.pad,.actions{display:none;}}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div class="hud" id="hud"></div>

<div class="pad" id="pad"><div class="stick" id="stick"></div></div>
<div class="actions">
  <button class="actionBtn fire" id="bFire">FIRE</button>
  <button class="actionBtn heal" id="bHeal">HEAL<br/>(H)</button>
  <button class="actionBtn shield" id="bShield">SHIELD<br/>(E)<span class="badge" id="shieldBadge">10</span></button>
</div>

<div class="center" id="menu">
  <h1>⚔️ Brawl Arena</h1>
  <p>Pick a brawler. Defeat enemies. Don't die.</p>
  <div class="chars" id="charPick"></div>
  <button class="btn" id="startBtn">START</button>
  <p style="opacity:.7;font-size:13px;max-width:380px;text-align:center;">WASD or joystick to move. Arrow keys / tap right side to shoot. H to heal (you can't move). E for shield (10s cooldown).</p>
</div>

<script>
(() => {
  const cvs = document.getElementById('game');
  const ctx = cvs.getContext('2d');
  const hud = document.getElementById('hud');
  const menu = document.getElementById('menu');
  const charPick = document.getElementById('charPick');
  const startBtn = document.getElementById('startBtn');

  function resize(){ cvs.width = innerWidth * devicePixelRatio; cvs.height = innerHeight * devicePixelRatio; cvs.style.width=innerWidth+'px'; cvs.style.height=innerHeight+'px'; ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0); }
  addEventListener('resize',resize); resize();

  const WORLD = { w: 1600, h: 1200 };

  const CHARACTERS = [
    { id:'shelly', name:'Buckshot', color:'#ff8a5b', hp:100, speed:170, fireRate:0.55, dmg:14, bulletSpeed:520, spread:0.35, pellets:5, range:380, desc:'Shotgun — close range burst' },
    { id:'colt',   name:'Ranger',   color:'#ffd34d', hp:80,  speed:200, fireRate:0.18, dmg:9,  bulletSpeed:680, spread:0.04, pellets:1, range:620, desc:'Rifle — fast & accurate' },
    { id:'bull',   name:'Tank',     color:'#a06bff', hp:150, speed:150, fireRate:0.7,  dmg:22, bulletSpeed:480, spread:0.18, pellets:4, range:340, desc:'Heavy — tanky brawler' },
  ];
  let selected = 0;
  function renderChars(){
    charPick.innerHTML='';
    CHARACTERS.forEach((c,i)=>{
      const d=document.createElement('div');
      d.className='char'+(i===selected?' sel':'');
      d.innerHTML = `<div style="font-size:28px">●</div><div style="color:${c.color};font-weight:bold">${c.name}</div><div style="font-size:11px;opacity:.8">HP ${c.hp} • DMG ${c.dmg}</div><div style="font-size:11px;opacity:.7;margin-top:4px">${c.desc}</div>`;
      d.style.borderColor = i===selected ? c.color : '#444';
      d.onclick = () => { selected = i; renderChars(); };
      charPick.appendChild(d);
    });
  }
  renderChars();

  // Input
  const keys = {};
  addEventListener('keydown',e=>{
    keys[e.key.toLowerCase()] = true;
    if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
    if(e.key==='1'||e.key==='2'||e.key==='3'){ selected=parseInt(e.key)-1; renderChars(); }
  });
  addEventListener('keyup',e=>{ keys[e.key.toLowerCase()] = false; });

  // Touch joystick
  const pad = document.getElementById('pad'), stick = document.getElementById('stick');
  let joy = {x:0,y:0,active:false};
  function padTouch(t){
    const r = pad.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    let dx = t.clientX - cx, dy = t.clientY - cy;
    const max = r.width/2 - 10;
    const m = Math.hypot(dx,dy);
    if(m>max){ dx = dx/m*max; dy = dy/m*max; }
    stick.style.transform = `translate(${dx}px,${dy}px)`;
    joy.x = dx/max; joy.y = dy/max; joy.active = true;
  }
  pad.addEventListener('touchstart',e=>{ padTouch(e.changedTouches[0]); },{passive:true});
  pad.addEventListener('touchmove', e=>{ padTouch(e.changedTouches[0]); },{passive:true});
  pad.addEventListener('touchend',  e=>{ joy={x:0,y:0,active:false}; stick.style.transform='translate(0,0)'; },{passive:true});

  // Touch fire / heal / shield
  let touchFire = false;
  document.getElementById('bFire').addEventListener('touchstart',e=>{e.preventDefault();touchFire=true;});
  document.getElementById('bFire').addEventListener('touchend',  e=>{e.preventDefault();touchFire=false;});
  document.getElementById('bHeal').addEventListener('touchstart',e=>{e.preventDefault();startHeal();});
  document.getElementById('bHeal').addEventListener('touchend',  e=>{e.preventDefault();stopHeal();});
  document.getElementById('bShield').addEventListener('touchstart',e=>{e.preventDefault();activateShield();});

  // Aim via pointer on right half of canvas
  let aim = {x: innerWidth/2, y: innerHeight/2};
  cvs.addEventListener('mousemove', e => { aim.x = e.clientX; aim.y = e.clientY; });
  cvs.addEventListener('mousedown', () => mouseFire=true);
  cvs.addEventListener('mouseup',   () => mouseFire=false);
  let mouseFire = false;
  cvs.addEventListener('touchstart',e=>{
    for(const t of e.changedTouches){ if(t.clientX > innerWidth/2){ aim.x=t.clientX; aim.y=t.clientY; touchFire=true; } }
  },{passive:true});
  cvs.addEventListener('touchmove',e=>{
    for(const t of e.changedTouches){ if(t.clientX > innerWidth/2){ aim.x=t.clientX; aim.y=t.clientY; } }
  },{passive:true});
  cvs.addEventListener('touchend',e=>{
    // if no remaining touches on right half, stop firing
    let any=false;
    for(const t of e.touches){ if(t.clientX > innerWidth/2) any=true; }
    if(!any) touchFire=false;
  },{passive:true});

  // Game state
  let state = null;

  function startGame(){
    const ch = CHARACTERS[selected];
    state = {
      t: 0,
      score: 0,
      kills: 0,
      player: {
        x: WORLD.w/2, y: WORLD.h/2, r: 18,
        hp: ch.hp, maxHp: ch.hp,
        char: ch,
        cool: 0,
        healing: false, healT: 0,
        shieldActive: false, shieldHits: 0, shieldCool: 0,
        speedBoost: 0, dmgBoost: 0,
        angle: 0,
      },
      bullets: [],
      enemies: [],
      powerups: [],
      particles: [],
      enemyTimer: 0,
      powerTimer: 2,
      cam: {x:0,y:0},
      over: false,
    };
    menu.style.display = 'none';
    spawnEnemies(3);
    loop();
  }
  startBtn.onclick = startGame;

  function spawnEnemies(n){
    for(let i=0;i<n;i++){
      const ang = Math.random()*Math.PI*2;
      const dist = 350 + Math.random()*300;
      const px = Math.max(50, Math.min(WORLD.w-50, state.player.x + Math.cos(ang)*dist));
      const py = Math.max(50, Math.min(WORLD.h-50, state.player.y + Math.sin(ang)*dist));
      const tier = Math.random();
      const e = {
        x:px,y:py,r:18,
        hp: 50 + Math.random()*40 + state.kills*4,
        maxHp: 0,
        speed: 90 + Math.random()*40,
        cool: Math.random(),
        dmg: 8 + Math.random()*6,
        fireRate: 0.9 + Math.random()*0.7,
        color: tier<0.33?'#5be0a8':tier<0.66?'#f06292':'#7ab9ff',
      };
      e.maxHp = e.hp;
      state.enemies.push(e);
    }
  }

  function spawnPowerup(){
    const types = [
      {k:'heal', color:'#3ec46d', label:'❤'},
      {k:'speed',color:'#ffd34d', label:'⚡'},
      {k:'dmg',  color:'#e85b5b', label:'💥'},
      {k:'shield',color:'#3b9cff',label:'🛡'},
    ];
    const t = types[Math.floor(Math.random()*types.length)];
    state.powerups.push({
      x: 80 + Math.random()*(WORLD.w-160),
      y: 80 + Math.random()*(WORLD.h-160),
      r: 16, ...t, life: 18,
    });
  }

  // Heal
  function startHeal(){
    if(!state||state.over) return;
    const p = state.player;
    if(p.hp >= p.maxHp) return;
    p.healing = true; p.healT = 0;
  }
  function stopHeal(){ if(state) state.player.healing = false; }

  // Shield
  function activateShield(){
    if(!state||state.over) return;
    const p = state.player;
    if(p.shieldCool > 0 || p.shieldActive || p.healing) return;
    p.shieldActive = true; p.shieldHits = 0; p.shieldCool = 10; // 10s cooldown begins now
  }
  addEventListener('keydown', e => {
    if(!state||state.over) return;
    const k = e.key.toLowerCase();
    if(k==='h') startHeal();
    if(k==='e') activateShield();
  });
  addEventListener('keyup', e => {
    if(!state) return;
    if(e.key.toLowerCase()==='h') stopHeal();
  });

  function fire(p){
    const ch = p.char;
    const dmg = ch.dmg * (p.dmgBoost>0 ? 1.6 : 1);
    for(let i=0;i<ch.pellets;i++){
      const a = p.angle + (Math.random()-0.5)*ch.spread;
      state.bullets.push({
        x:p.x, y:p.y, vx:Math.cos(a)*ch.bulletSpeed, vy:Math.sin(a)*ch.bulletSpeed,
        life: ch.range/ch.bulletSpeed, dmg, from:'p', color:ch.color, r:5,
      });
    }
    p.cool = ch.fireRate;
  }

  function enemyFire(e, p){
    const a = Math.atan2(p.y-e.y, p.x-e.x);
    state.bullets.push({
      x:e.x, y:e.y, vx:Math.cos(a)*420, vy:Math.sin(a)*420,
      life: 1.4, dmg:e.dmg, from:'e', color:e.color, r:5,
    });
    e.cool = e.fireRate;
  }

  let last = performance.now();
  function loop(){
    const now = performance.now();
    let dt = (now-last)/1000; if(dt>0.05) dt=0.05;
    last = now;
    update(dt);
    render();
    if(!state.over) requestAnimationFrame(loop);
  }

  function update(dt){
    const s = state, p = s.player;
    s.t += dt;

    // Healing: completely immobile, cannot fire/shield/move
    if(p.healing){
      p.healT += dt;
      p.hp = Math.min(p.maxHp, p.hp + 28*dt); // ~3.5s for full heal from 0
      if(p.hp >= p.maxHp) p.healing = false;
    } else {
      // Movement
      let mx=0,my=0;
      if(keys['w']) my-=1;
      if(keys['s']) my+=1;
      if(keys['a']) mx-=1;
      if(keys['d']) mx+=1;
      if(joy.active){ mx += joy.x; my += joy.y; }
      const m = Math.hypot(mx,my);
      if(m>0){ mx/=m; my/=m; }
      const spd = p.char.speed * (p.speedBoost>0?1.5:1);
      p.x = Math.max(p.r, Math.min(WORLD.w-p.r, p.x + mx*spd*dt));
      p.y = Math.max(p.r, Math.min(WORLD.h-p.r, p.y + my*spd*dt));
    }

    // Aim angle
    if(!p.healing){
      // arrow keys auto-aim
      let ax=0, ay=0;
      if(keys['arrowup']) ay-=1;
      if(keys['arrowdown']) ay+=1;
      if(keys['arrowleft']) ax-=1;
      if(keys['arrowright']) ax+=1;
      if(ax||ay){ p.angle = Math.atan2(ay,ax); }
      else {
        // aim toward mouse/touch (screen coords -> world)
        const sx = aim.x + s.cam.x, sy = aim.y + s.cam.y;
        p.angle = Math.atan2(sy-p.y, sx-p.x);
      }
    }

    // Boost timers
    if(p.speedBoost>0) p.speedBoost = Math.max(0, p.speedBoost-dt);
    if(p.dmgBoost>0)   p.dmgBoost   = Math.max(0, p.dmgBoost-dt);

    // Shield cooldown
    if(p.shieldCool>0) p.shieldCool = Math.max(0, p.shieldCool-dt);

    // Fire
    p.cool -= dt;
    const wantFire = (!p.healing) && (mouseFire || touchFire || keys[' '] || keys['arrowup']||keys['arrowdown']||keys['arrowleft']||keys['arrowright']);
    if(wantFire && p.cool<=0) fire(p);

    // Bullets
    for(let i=s.bullets.length-1;i>=0;i--){
      const b = s.bullets[i];
      b.x += b.vx*dt; b.y += b.vy*dt; b.life -= dt;
      if(b.life<=0 || b.x<0||b.y<0||b.x>WORLD.w||b.y>WORLD.h){ s.bullets.splice(i,1); continue; }
      if(b.from==='p'){
        for(const e of s.enemies){
          if(Math.hypot(b.x-e.x,b.y-e.y) < e.r+b.r){
            e.hp -= b.dmg;
            s.particles.push({x:b.x,y:b.y,vx:0,vy:0,life:.3,color:e.color});
            s.bullets.splice(i,1); break;
          }
        }
      } else {
        if(Math.hypot(b.x-p.x,b.y-p.y) < p.r+b.r){
          let dmg = b.dmg;
          if(p.shieldActive){
            if(p.shieldHits===0){ dmg *= 0.25; }
            else { dmg = b.dmg; }
            p.shieldHits++;
            if(p.shieldHits>=2){ p.shieldActive=false; }
          }
          p.hp -= dmg;
          s.particles.push({x:b.x,y:b.y,vx:0,vy:0,life:.3,color:'#ff5a5a'});
          s.bullets.splice(i,1);
          if(p.hp<=0){ p.hp=0; gameOver(); }
        }
      }
    }

    // Enemies
    for(let i=s.enemies.length-1;i>=0;i--){
      const e = s.enemies[i];
      const dx = p.x-e.x, dy = p.y-e.y, d = Math.hypot(dx,dy);
      const aim = d>260 ? 1 : (d<200 ? -0.4 : 0);
      if(d>1){ e.x += (dx/d)*e.speed*aim*dt; e.y += (dy/d)*e.speed*aim*dt; }
      e.cool -= dt;
      if(e.cool<=0 && d<460) enemyFire(e,p);
      if(e.hp<=0){
        s.enemies.splice(i,1);
        s.kills++; s.score += 100;
        for(let k=0;k<10;k++) s.particles.push({x:e.x,y:e.y,vx:(Math.random()-.5)*160,vy:(Math.random()-.5)*160,life:.6,color:e.color});
      }
    }

    // Spawn enemies over time
    s.enemyTimer -= dt;
    if(s.enemies.length<6 && s.enemyTimer<=0){ spawnEnemies(1); s.enemyTimer = 2.5; }

    // Powerups
    s.powerTimer -= dt;
    if(s.powerTimer<=0 && s.powerups.length<5){ spawnPowerup(); s.powerTimer = 5 + Math.random()*4; }
    for(let i=s.powerups.length-1;i>=0;i--){
      const pu = s.powerups[i];
      pu.life -= dt;
      if(pu.life<=0){ s.powerups.splice(i,1); continue; }
      if(Math.hypot(pu.x-p.x,pu.y-p.y) < pu.r+p.r){
        applyPowerup(pu);
        s.powerups.splice(i,1);
      }
    }

    // Particles
    for(let i=s.particles.length-1;i>=0;i--){
      const pa = s.particles[i];
      pa.x += pa.vx*dt; pa.y += pa.vy*dt; pa.life -= dt;
      if(pa.life<=0) s.particles.splice(i,1);
    }

    // Camera follows player
    s.cam.x = p.x - innerWidth/2;
    s.cam.y = p.y - innerHeight/2;
    s.cam.x = Math.max(0, Math.min(WORLD.w - innerWidth, s.cam.x));
    s.cam.y = Math.max(0, Math.min(WORLD.h - innerHeight, s.cam.y));
  }

  function applyPowerup(pu){
    const p = state.player;
    if(pu.k==='heal')   p.hp = Math.min(p.maxHp, p.hp + 40);
    if(pu.k==='speed')  p.speedBoost = 6;
    if(pu.k==='dmg')    p.dmgBoost   = 8;
    if(pu.k==='shield'){ p.shieldCool = 0; } // refresh shield availability
    state.score += 25;
  }

  function gameOver(){
    state.over = true;
    setTimeout(()=>{
      menu.style.display = 'flex';
      menu.querySelector('h1').textContent = '☠️ K.O.';
      menu.querySelectorAll('p')[0].textContent = `Score: ${state.score} • Kills: ${state.kills}. Try again!`;
    }, 600);
  }

  function render(){
    const s = state; if(!s) return;
    const cam = s.cam;
    ctx.clearRect(0,0,innerWidth,innerHeight);

    // Arena floor
    ctx.fillStyle = '#222630';
    ctx.fillRect(-cam.x, -cam.y, WORLD.w, WORLD.h);

    // grid
    ctx.strokeStyle = 'rgba(255,255,255,.04)';
    ctx.lineWidth = 1;
    const grid = 64;
    for(let gx=0; gx<=WORLD.w; gx+=grid){ ctx.beginPath(); ctx.moveTo(gx-cam.x,-cam.y); ctx.lineTo(gx-cam.x,WORLD.h-cam.y); ctx.stroke(); }
    for(let gy=0; gy<=WORLD.h; gy+=grid){ ctx.beginPath(); ctx.moveTo(-cam.x,gy-cam.y); ctx.lineTo(WORLD.w-cam.x,gy-cam.y); ctx.stroke(); }

    // boundary
    ctx.strokeStyle='#ffcc33'; ctx.lineWidth=3;
    ctx.strokeRect(-cam.x,-cam.y,WORLD.w,WORLD.h);

    // Powerups
    for(const pu of s.powerups){
      const x = pu.x-cam.x, y = pu.y-cam.y;
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(Math.sin(s.t*3)*0.1);
      ctx.fillStyle = pu.color;
      ctx.beginPath(); ctx.arc(0,0,pu.r,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='#fff'; ctx.font='bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(pu.label, 0, 1);
      ctx.restore();
    }

    // Enemies
    for(const e of s.enemies){
      const x = e.x-cam.x, y = e.y-cam.y;
      ctx.fillStyle = e.color;
      ctx.beginPath(); ctx.arc(x,y,e.r,0,Math.PI*2); ctx.fill();
      // hp
      ctx.fillStyle='#000'; ctx.fillRect(x-20,y-30,40,5);
      ctx.fillStyle='#5be0a8'; ctx.fillRect(x-20,y-30,40*(e.hp/e.maxHp),5);
    }

    // Bullets
    for(const b of s.bullets){
      ctx.fillStyle = b.color; ctx.beginPath(); ctx.arc(b.x-cam.x,b.y-cam.y,b.r,0,Math.PI*2); ctx.fill();
    }

    // Player
    const p = s.player;
    const px = p.x-cam.x, py = p.y-cam.y;
    // aim line
    ctx.strokeStyle = 'rgba(255,255,255,.25)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+Math.cos(p.angle)*40, py+Math.sin(p.angle)*40); ctx.stroke();
    // body
    ctx.fillStyle = p.char.color;
    ctx.beginPath(); ctx.arc(px,py,p.r,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#fff'; ctx.lineWidth=2; ctx.stroke();
    // heal ring
    if(p.healing){
      ctx.strokeStyle='#3ec46d'; ctx.lineWidth=4;
      ctx.beginPath(); ctx.arc(px,py,p.r+10+Math.sin(s.t*8)*2,0,Math.PI*2); ctx.stroke();
      ctx.fillStyle='#3ec46d'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
      ctx.fillText('HEALING (immobile)', px, py-34);
    }
    // shield ring
    if(p.shieldActive){
      ctx.strokeStyle = p.shieldHits===0 ? '#3b9cff' : '#a0d4ff';
      ctx.lineWidth = p.shieldHits===0 ? 5 : 2;
      ctx.beginPath(); ctx.arc(px,py,p.r+8,0,Math.PI*2); ctx.stroke();
    }
    // hp
    ctx.fillStyle='#000'; ctx.fillRect(px-26,py-32,52,6);
    ctx.fillStyle='#5be0a8'; ctx.fillRect(px-26,py-32,52*(p.hp/p.maxHp),6);

    // Particles
    for(const pa of s.particles){
      ctx.fillStyle = pa.color; ctx.globalAlpha = Math.max(0,pa.life);
      ctx.beginPath(); ctx.arc(pa.x-cam.x,pa.y-cam.y,3,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // HUD
    hud.innerHTML =
      `<b>${p.char.name}</b> &nbsp; HP ${Math.ceil(p.hp)}/${p.maxHp}` +
      `<br/>Score: ${s.score} &nbsp; Kills: ${s.kills}` +
      `<br/>Shield: ${p.shieldActive ? (p.shieldHits===0?'ACTIVE (full)':'WEAK (1 hit left)') : (p.shieldCool>0?`cooldown ${p.shieldCool.toFixed(1)}s`:'ready (E)')}` +
      (p.speedBoost>0?`<br/>⚡ Speed ${p.speedBoost.toFixed(1)}s`:'') +
      (p.dmgBoost>0?`<br/>💥 Damage ${p.dmgBoost.toFixed(1)}s`:'') +
      (p.healing?`<br/><span style="color:#3ec46d">Healing… stand still</span>`:'');

    // Update shield badge
    const sb = document.getElementById('shieldBadge');
    if(sb) sb.textContent = p.shieldCool>0 ? Math.ceil(p.shieldCool) : '✓';
  }
})();
</script>
</body>
</html>
