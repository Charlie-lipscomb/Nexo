<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Mode: T&C Chat</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; margin: 0; padding: 20px; text-align: center; }
        #login-screen { background: #075e54; color: white; padding: 40px 20px; border-radius: 15px; }
        #chat-area { display: none; }
        .debug-panel { background: #eee; padding: 10px; margin-bottom: 20px; border: 1px solid #ccc; font-size: 12px; }
        #chat-box { height: 300px; overflow-y: auto; background: white; border: 1px solid #ddd; margin: 20px 0; padding: 10px; display: flex; flex-direction: column; }
        .msg { padding: 8px; margin: 5px; border-radius: 10px; max-width: 80%; }
        .tori { align-self: flex-start; background: #e2e2e2; }
        .charlie { align-self: flex-end; background: #dcf8c6; }
        input { padding: 12px; width: 80%; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { padding: 12px 24px; background: #25d366; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .test-btn { background: #3498db; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="debug-panel" id="status">Status: Waiting for Firebase...</div>

    <div id="login-screen">
        <h2>T&C Messenger</h2>
        <input type="number" id="passcode" placeholder="Enter Code">
        <button onclick="tryLogin()">Login</button>
        <br>
        <button class="test-btn" onclick="runConnectionTest()">Verify Backend Connection</button>
    </div>

    <div id="chat-area">
        <div id="chat-box"></div>
        <input type="text" id="msgInput" placeholder="Write a message...">
        <button onclick="sendMsg()">Send</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // 1. YOUR CONFIG - MUST BE FILLED IN
        const firebaseConfig = {
            apiKey: "AIzaSyDlBIFEJqVv5RfLNOh6POyO1hPeQ1CVRPY",
            projectId: "nexo-0",
            appId: "1:977099086248:web:fc05dccab20b41aee2e59d"
        };

        // 2. INITIALIZE
        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.firestore();
            document.getElementById('status').innerText = "Status: Firebase Initialized";
        } catch (e) {
            alert("Init Error: " + e.message);
        }

        let user = "";

        // 3. CONNECTION TEST (The "Doctor" Button)
        function runConnectionTest() {
            alert("Starting test...");
            db.collection("test_connection").add({
                test: "Is this working?",
                time: new Date()
            })
            .then(() => alert("SUCCESS: Database is WRITING!"))
            .catch(err => alert("DATABASE FAIL: " + err.message));
        }

        // 4. LOGIN LOGIC
        function tryLogin() {
            const code = document.getElementById('passcode').value;
            if (code === "000000") user = "Tori";
            else if (code === "111111") user = "Charlie";
            else { alert("Wrong code"); return; }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('chat-area').style.display = 'block';
            document.getElementById('status').innerText = "Status: Logged in as " + user;
            
            startListening();
        }

        // 5. SEND LOGIC
        function sendMsg() {
            const txt = document.getElementById('msgInput').value;
            if(!txt) return;

            db.collection("messages").add({
                sender: user,
                text: txt,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            })
            .then(() => { document.getElementById('msgInput').value = ""; })
            .catch(e => alert("Send Error: " + e.message));
        }

        // 6. READ LOGIC
        function startListening() {
            db.collection("messages").orderBy("timestamp", "asc")
            .onSnapshot(snap => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const d = document.createElement('div');
                    d.className = "msg " + (data.sender === "Tori" ? "tori" : "charlie");
                    d.innerHTML = `<b>${data.sender}:</b> ${data.text}`;
                    box.appendChild(d);
                });
                box.scrollTop = box.scrollHeight;
            }, err => alert("Read Error: " + err.message));
        }
    </script>
</body>
</html>
