<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexo</title>
    <style>
        /* CSS stays here so we know it loads */
        body { font-family: sans-serif; background: #e5ddd5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #login-screen { position: fixed; inset: 0; background: #075e54; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 70%; word-wrap: break-word; }
        .tori { align-self: flex-start; background: white; }
        .charlie { align-self: flex-end; background: #dcf8c6; }
        #input-area { padding: 10px; background: #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #25d366; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Private Chat</h1>
        <input type="text" id="passcode" placeholder="Enter 6 digits" maxlength="6">
        <button id="loginBtn">Login</button>
    </div>

    <div id="chat-box"></div>
    
    <div id="input-area">
        <input type="text" id="msgInput" placeholder="Message...">
        <button id="sendBtn">Send</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>

    <script>
        // 1. YOUR CONFIG (Make sure these are filled in!)
        const firebaseConfig = {
            apiKey: "AIzaSyDlBIFEJqVv5RfLNOh6POyO1hPeQ1CVRPY",
            authDomain: "nexo-0.firebaseapp.com",
            databaseURL: "https://nexo-0-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "nexo-0",
            storageBucket: "nexo-0.firebasestorage.app",
            messagingSenderId: "977099086248",
            appId: "1:977099086248:web:fc05dccab20b41aee2e59d",
            measurementId: "G-DK9RDC3DY5"
        };

        // Initialize Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.firestore();
            console.log("Firebase initialized");
        } catch (e) {
            alert("Firebase Setup Error: " + e.message);
        }

        let currentUser = "";

        // Wait for elements to exist
        window.onload = function() {
            const loginBtn = document.getElementById('loginBtn');
            const sendBtn = document.getElementById('sendBtn');
            const passcodeInp = document.getElementById('passcode');
            const msgInp = document.getElementById('msgInput');

            // DEBUG: Check if buttons are found
            if (!loginBtn || !sendBtn) {
                alert("Critical Error: Buttons not found in HTML!");
                return;
            }

            // LOGIN LOGIC
            loginBtn.onclick = function() {
                const code = passcodeInp.value;
                if (code === "000000") {
                    currentUser = "Tori";
                } else if (code === "111111") {
                    currentUser = "Charlie";
                } else {
                    alert("Wrong code! Use 000000 or 111111");
                    return;
                }
                
                document.getElementById('login-screen').style.display = 'none';
                startListening();
            };

            // SEND LOGIC
            sendBtn.onclick = function() {
                const text = msgInp.value.trim();
                if (!text) return;

                db.collection("messages").add({
                    user: currentUser,
                    content: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                }).then(() => {
                    msgInp.value = "";
                }).catch(err => {
                    alert("Send Error: " + err.message);
                });
            };
        };

        function startListening() {
            db.collection("messages").orderBy("timestamp", "asc")
              .onSnapshot((snapshot) => {
                const chatBox = document.getElementById('chat-box');
                chatBox.innerHTML = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'msg ' + (data.user === "Tori" ? 'tori' : 'charlie');
                    div.innerHTML = `<b>${data.user}:</b> ${data.content}`;
                    chatBox.appendChild(div);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            }, (err) => {
                alert("Database Error: " + err.message);
            });
        }
    </script>
</body>
</html>
