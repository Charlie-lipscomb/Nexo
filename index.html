<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>BRAWL ARENA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;user-select:none;-webkit-user-select:none;font-family:'Courier New',monospace;}
#gc,#mc{display:block;position:fixed;top:0;left:0;}
#mc{pointer-events:none;}

/* ── CRT ── */
#crt{position:fixed;inset:0;pointer-events:none;z-index:60;}
#crt::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,rgba(0,0,0,.06) 0,rgba(0,0,0,.06) 1px,transparent 1px,transparent 3px);}
#crt::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 42%,transparent 50%,rgba(0,0,0,.75) 100%);}

/* ── MENU ── */
#menu{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:20px 16px 30px;}
#mbg{position:fixed;inset:0;z-index:39;}
#menu-inner{position:relative;z-index:1;width:100%;max-width:880px;display:flex;flex-direction:column;align-items:center;}
.m-title{font-size:clamp(40px,8vw,86px);font-weight:bold;letter-spacing:10px;color:#ffd34d;text-shadow:0 0 80px #ffd34d55,0 0 160px #ffd34d22;text-align:center;line-height:1;margin-top:18px;}
.m-sub{font-size:10px;letter-spacing:5px;color:#3a3a3a;margin:6px 0 24px;text-align:center;}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;width:100%;margin-bottom:20px;}
.cc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);padding:14px 12px 10px;cursor:pointer;transition:transform .1s,border-color .1s,box-shadow .1s;}
.cc:hover{transform:translateY(-2px);}
.cc.sel{border-color:var(--c);box-shadow:0 0 22px color-mix(in srgb,var(--c) 28%,transparent);}
.cc-ico{font-size:28px;display:block;text-align:center;margin-bottom:6px;}
.cc-nm{font-size:13px;font-weight:bold;letter-spacing:2px;text-align:center;margin-bottom:2px;text-transform:uppercase;}
.cc-role{font-size:8px;letter-spacing:2px;color:#4a4a4a;text-align:center;margin-bottom:8px;text-transform:uppercase;}
.sbar-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.sbar-lbl{font-size:8px;color:#3a3a3a;width:26px;letter-spacing:1px;text-transform:uppercase;}
.sbar-bg{flex:1;height:3px;background:rgba(255,255,255,.08);}
.sbar-fill{height:100%;}
.cc-tip{font-size:8px;color:#3a3a3a;letter-spacing:.5px;line-height:1.5;margin-top:7px;text-align:center;}
.go-btn{font-size:17px;font-weight:bold;letter-spacing:5px;background:#ffd34d;color:#111;border:none;padding:13px 50px;cursor:pointer;transition:all .1s;margin-bottom:14px;text-transform:uppercase;}
.go-btn:hover{background:#fff;transform:scale(1.03);}
.ctrl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:4px;width:100%;}
.ctrl{font-size:9px;letter-spacing:.5px;color:#333;padding:3px 0;border-top:1px solid rgba(255,255,255,.04);}
.ctrl b{color:#585858;}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;height:74px;background:linear-gradient(180deg,rgba(0,0,0,.94) 0%,rgba(0,0,0,.25) 85%,transparent 100%);padding:8px 14px 0;display:flex;gap:18px;align-items:flex-start;pointer-events:none;z-index:30;}
.hud-l{min-width:196px;}
.hud-c{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;}
.hud-r{min-width:196px;display:flex;flex-direction:column;align-items:flex-end;}
.hlbl{font-size:8px;letter-spacing:2px;color:#444;text-transform:uppercase;margin-bottom:1px;}
.hval{font-size:20px;font-weight:bold;letter-spacing:1px;line-height:1.1;}
.bar-wrap{height:6px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:3px;}
.bar-fill{height:100%;transition:width .07s,background .25s;}
.pips{display:flex;gap:3px;margin-top:5px;}
.pip{width:10px;height:10px;border:1.5px solid rgba(255,255,255,.18);border-radius:1px;}
.pip.on{background:#ffd34d;border-color:#ffd34d;box-shadow:0 0 6px #ffd34daa;}
.pip.bl{animation:blnk .3s infinite;}
@keyframes blnk{0%,100%{opacity:.25}50%{opacity:.85}}
#abil-row{display:flex;gap:7px;margin-top:4px;}
.ab{display:flex;flex-direction:column;align-items:center;gap:1px;}
.ab-box{width:28px;height:28px;border:1.5px solid rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:12px;position:relative;}
.ab-box.rdy{border-color:var(--ac);box-shadow:0 0 7px var(--ac);}
.ab-box.act{background:var(--ac);border-color:var(--ac);}
.ab-cd{position:absolute;inset:0;background:rgba(0,0,0,.68);display:flex;align-items:center;justify-content:center;font-size:9px;color:#999;}
.ab-key{font-size:7px;letter-spacing:1px;color:#3a3a3a;text-transform:uppercase;}
#lvl-badge{font-size:10px;letter-spacing:2px;color:#a06bff;margin-bottom:1px;}
#wv-info{font-size:9px;letter-spacing:2px;color:#444;margin-top:2px;}

/* ── OVERLAYS ── */
.banner-wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:35;}
#bm{font-size:clamp(32px,6vw,66px);font-weight:bold;letter-spacing:7px;text-transform:uppercase;text-shadow:0 0 60px currentColor;opacity:0;transform:scaleX(1.18) translateY(6px);transition:opacity .16s,transform .16s;}
#bs{font-size:13px;letter-spacing:5px;text-transform:uppercase;opacity:0;margin-top:9px;transition:opacity .14s .04s;}
#bm.on,#bs.on{opacity:1;transform:scaleX(1) translateY(0);}

#streak{position:fixed;top:19%;left:0;right:0;text-align:center;font-size:25px;font-weight:bold;letter-spacing:4px;opacity:0;text-shadow:0 0 22px currentColor;transition:opacity .1s;pointer-events:none;z-index:36;}
#streak.on{opacity:1;}
#combo{position:fixed;left:50%;transform:translateX(-50%);bottom:96px;font-size:28px;font-weight:bold;letter-spacing:3px;opacity:0;text-shadow:0 0 22px currentColor;transition:opacity .14s;pointer-events:none;z-index:36;}
#combo.on{opacity:1;}

/* ── BOSS BAR ── */
#boss-wrap{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);width:min(440px,88vw);display:none;pointer-events:none;z-index:30;}
#boss-nm{font-size:9px;letter-spacing:3px;color:#ff3a5c;text-align:center;margin-bottom:3px;text-transform:uppercase;}
#boss-track{height:10px;background:rgba(255,255,255,.07);}
#boss-bar{height:100%;background:linear-gradient(90deg,#8a0020,#ff3a5c);transition:width .1s;}
#boss-phases{display:flex;justify-content:center;gap:5px;margin-top:3px;}
.bph{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);}
.bph.on{background:#ff3a5c;box-shadow:0 0 5px #ff3a5c;}
#cdwn{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:3px;color:#3a3a3a;pointer-events:none;z-index:30;transition:opacity .2s;}

/* ── UPGRADE SCREEN ── */
#upg{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:50;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;}
#upg.on{display:flex;}
#upg-title{font-size:30px;font-weight:bold;letter-spacing:6px;color:#a06bff;text-shadow:0 0 40px #a06bff66;}
#upg-sub{font-size:10px;letter-spacing:3px;color:#444;}
#upg-cards{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;max-width:720px;}
.uc{width:188px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);padding:18px 14px;cursor:pointer;transition:all .1s;pointer-events:all;}
.uc:hover{border-color:#a06bff;background:rgba(160,107,255,.08);transform:translateY(-3px);}
.uc-ico{font-size:26px;display:block;text-align:center;margin-bottom:7px;}
.uc-nm{font-size:12px;font-weight:bold;letter-spacing:2px;color:#a06bff;text-align:center;margin-bottom:5px;text-transform:uppercase;}
.uc-desc{font-size:8px;color:#555;letter-spacing:.5px;line-height:1.6;text-align:center;}

/* ── DEATH SCREEN ── */
#death{position:fixed;inset:0;z-index:48;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,0);}
#death.on{display:flex;animation:dfade .7s forwards;}
@keyframes dfade{to{background:rgba(0,0,0,.9);}}
#d-title{font-size:58px;font-weight:bold;letter-spacing:6px;color:#ff3a5c;text-shadow:0 0 70px #ff3a5c66;animation:dpop .55s .15s both;}
#d-stats{font-size:11px;letter-spacing:2px;color:#4a4a4a;line-height:2.1;text-align:center;animation:dpop .55s .45s both;}
#d-btn{font-size:15px;font-weight:bold;letter-spacing:4px;background:#ff3a5c;color:#111;border:none;padding:11px 38px;cursor:pointer;animation:dpop .55s .7s both;pointer-events:all;}
#d-btn:hover{background:#fff;}
@keyframes dpop{from{opacity:0;transform:scale(1.25)}to{opacity:1;transform:scale(1)}}

/* ── KILLFEED ── */
#kf{position:fixed;right:155px;top:80px;display:flex;flex-direction:column;gap:2px;pointer-events:none;z-index:30;}
.kfe{font-size:10px;letter-spacing:1px;padding:2px 7px;background:rgba(0,0,0,.68);border-left:2px solid;white-space:nowrap;transition:opacity .25s;}

/* ── MINIMAP ── */
#mm-wrap{position:fixed;right:13px;top:80px;z-index:30;pointer-events:none;}

/* ── TOUCH ── */
.tpad{position:fixed;left:14px;bottom:14px;width:124px;height:124px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);touch-action:none;z-index:35;}
.tknob{position:absolute;left:50%;top:50%;width:48px;height:48px;margin:-24px;border-radius:50%;background:rgba(255,255,255,.18);pointer-events:none;}
.tbtns{position:fixed;right:10px;bottom:10px;display:flex;flex-direction:column;gap:7px;z-index:35;}
.tbtn{width:64px;height:64px;border-radius:50%;border:1.5px solid rgba(255,255,255,.15);background:rgba(0,0,0,.6);color:#fff;font-size:9px;font-weight:bold;letter-spacing:1px;display:flex;align-items:center;justify-content:center;flex-direction:column;position:relative;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tbtn .tcd{position:absolute;top:-3px;right:-3px;background:#111;border-radius:7px;font-size:9px;padding:1px 4px;}
@media(hover:hover){.tpad,.tbtns{display:none!important;}}
</style>
</head>
<body>
<div id="crt"></div>
<canvas id="gc"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-l">
    <div class="hlbl" id="char-lbl">—</div>
    <div class="hval"><span id="hp-val">0</span><span style="font-size:10px;color:#333"> HP</span></div>
    <div class="bar-wrap" style="width:190px"><div class="bar-fill" id="hp-fill"></div></div>
    <div class="bar-wrap" style="width:190px;margin-top:2px;height:2px"><div class="bar-fill" id="sh-fill" style="background:#3b9cff;width:0"></div></div>
    <div class="bar-wrap" style="width:190px;margin-top:1px;height:2px"><div class="bar-fill" id="xp-fill" style="background:#a06bff;width:0"></div></div>
    <div class="pips" id="pips"></div>
  </div>
  <div class="hud-c">
    <div id="lvl-badge">LVL 1</div>
    <div class="hval" id="score-val">0</div>
    <div class="hlbl">SCORE</div>
    <div id="wv-info">—</div>
    <div id="abil-row"></div>
  </div>
  <div class="hud-r">
    <div class="hlbl">KILLS</div>
    <div class="hval" id="kills-val">0</div>
    <div class="hlbl" style="margin-top:4px" id="streak-lbl"></div>
  </div>
</div>

<div id="mm-wrap"><canvas id="mc" width="132" height="98"></canvas></div>

<!-- Banners -->
<div class="banner-wrap"><div id="bm"></div><div id="bs"></div></div>
<div id="streak"></div>
<div id="combo"></div>

<!-- Boss bar -->
<div id="boss-wrap">
  <div id="boss-nm">BOSS</div>
  <div id="boss-track"><div id="boss-bar" style="width:100%"></div></div>
  <div id="boss-phases"></div>
</div>
<div id="cdwn"></div>

<!-- Kill feed -->
<div id="kf"></div>

<!-- Upgrade -->
<div id="upg">
  <div id="upg-title">LEVEL UP</div>
  <div id="upg-sub">CHOOSE AN UPGRADE · CHOOSE WISELY</div>
  <div id="upg-cards"></div>
</div>

<!-- Death -->
<div id="death">
  <div id="d-title">ELIMINATED</div>
  <div id="d-stats"></div>
  <button id="d-btn" onclick="openMenu()">PLAY AGAIN</button>
</div>

<!-- Menu -->
<div id="menu">
  <canvas id="mbg" style="position:fixed;inset:0;z-index:0;"></canvas>
  <div id="menu-inner">
    <div class="m-title" id="m-title">BRAWL ARENA</div>
    <div class="m-sub" id="m-sub">SELECT YOUR BRAWLER</div>
    <div class="cgrid" id="cgrid"></div>
    <button class="go-btn" id="go-btn">ENTER THE ARENA</button>
    <div class="ctrl-grid">
      <div class="ctrl"><b>WASD</b> Move</div>
      <div class="ctrl"><b>Mouse</b> Aim + Shoot</div>
      <div class="ctrl"><b>H</b> Heal (no bushes!)</div>
      <div class="ctrl"><b>E</b> Shield · 10s CD</div>
      <div class="ctrl"><b>F</b> Dash · 4s CD</div>
      <div class="ctrl"><b>Kill waves</b> → Level up</div>
      <div class="ctrl"><b>Bushes</b> Break line-of-sight</div>
      <div class="ctrl"><b>Walls</b> Hard cover</div>
    </div>
  </div>
</div>

<!-- Touch -->
<div class="tpad" id="tpad"><div class="tknob" id="tknob"></div></div>
<div class="tbtns">
  <div class="tbtn" id="tb-h" style="border-color:#3ec46d;color:#3ec46d">HEAL<span class="tcd" id="tc-h"></span></div>
  <div class="tbtn" id="tb-e" style="border-color:#3b9cff;color:#3b9cff">SHIELD<span class="tcd" id="tc-e"></span></div>
  <div class="tbtn" id="tb-f" style="border-color:#ffd34d;color:#ffd34d">DASH<span class="tcd" id="tc-f"></span></div>
</div>

<script>
"use strict";
// ═══════════════════════════════════════════════════
//  BRAWL ARENA — Final Edition
// ═══════════════════════════════════════════════════
const GC=document.getElementById('gc'),ctx=GC.getContext('2d');
const MC=document.getElementById('mc'),mctx=MC.getContext('2d');
const MBG=document.getElementById('mbg'),mbctx=MBG.getContext('2d');

function resize(){
  GC.width=innerWidth*devicePixelRatio; GC.height=innerHeight*devicePixelRatio;
  GC.style.width=innerWidth+'px'; GC.style.height=innerHeight+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
}
addEventListener('resize',resize); resize();

// ═══ WORLD ═══
const W={w:2600,h:1800}, T=64;

// ═══ CHARACTERS ═══
const CHARS=[
  {id:'ranger',  name:'RANGER',   icon:'🎯', color:'#ffd34d', role:'Sharpshooter',
   hp:82,spd:212,fr:.16,dmg:14,bs:800,spread:.02,pellets:1,range:720,ammo:6,reload:.90,
   bars:{dmg:4,spd:4,hp:2,rng:5}, tip:'Precision rifle. Deadliest at range.'},
  {id:'buckshot',name:'BUCKSHOT', icon:'🔫', color:'#ff8a5b', role:'Brawler',
   hp:120,spd:174,fr:.50,dmg:12,bs:550,spread:.27,pellets:6,range:390,ammo:3,reload:1.35,
   bars:{dmg:4,spd:3,hp:3,rng:2}, tip:'6-pellet shotgun. Brutal up close.'},
  {id:'ironclad',name:'IRONCLAD', icon:'🛡', color:'#a06bff', role:'Tank',
   hp:190,spd:144,fr:.62,dmg:19,bs:510,spread:.12,pellets:3,range:370,ammo:2,reload:1.55,
   bars:{dmg:3,spd:2,hp:5,rng:2}, tip:'Walk through fire. Return it.'},
  {id:'phantom', name:'PHANTOM',  icon:'👻', color:'#5be0e8', role:'Assassin',
   hp:66,spd:255,fr:.19,dmg:21,bs:640,spread:.035,pellets:1,range:500,ammo:4,reload:.78,
   bars:{dmg:5,spd:5,hp:1,rng:3}, tip:'Fastest alive. Won\'t stay that way.'},
  {id:'havoc',   name:'HAVOC',    icon:'💣', color:'#e85b5b', role:'Destroyer',
   hp:138,spd:156,fr:.76,dmg:15,bs:430,spread:.20,pellets:4,range:350,ammo:2,reload:1.72,
   bars:{dmg:5,spd:2,hp:4,rng:1}, tip:'Maximum carnage. Minimum range.'},
];
let SEL=0;

// ═══ UPGRADES ═══
const UPGRADES=[
  {id:'hp',    ico:'❤', nm:'TOUGHNESS',  desc:'+30 max HP.\nRestore 20 HP.',  fn:p=>{p.maxHp+=30;p.hp=Math.min(p.maxHp,p.hp+20);}},
  {id:'spd',   ico:'⚡', nm:'OVERDRIVE',  desc:'Move speed +13%.',            fn:p=>{p.spdMul=(p.spdMul||1)*1.13;}},
  {id:'dmg',   ico:'💥', nm:'HOT ROUNDS', desc:'Damage +22%.',                fn:p=>{p.dmgMul=(p.dmgMul||1)*1.22;}},
  {id:'ammo',  ico:'▣',  nm:'HIGH CAP',   desc:'+1 ammo.\nReload 10% faster.',fn:p=>{p.maxAmmo++;p.ammo=p.maxAmmo;p.char={...p.char,reload:p.char.reload*.9};}},
  {id:'dash',  ico:'💨', nm:'AFTERBURN',  desc:'Dash cooldown −1.5 s.',       fn:p=>{p.dashBase=Math.max(1.2,(p.dashBase||4)-1.5);}},
  {id:'shield',ico:'🛡', nm:'BULWARK',    desc:'Shield takes 3 hits now.',    fn:p=>{p.shMaxHits=3;}},
  {id:'leech', ico:'🩸', nm:'LIFESTEAL',  desc:'Each kill heals 8 HP.',       fn:p=>{p.leech=(p.leech||0)+8;}},
  {id:'pierce',ico:'🔩', nm:'PIERCING',   desc:'Bullets pierce +1 enemy.',   fn:p=>{p.pierce=(p.pierce||0)+1;}},
  {id:'acc',   ico:'🎯', nm:'PRECISION',  desc:'Bullet spread −30%.',         fn:p=>{p.char={...p.char,spread:p.char.spread*.7};}},
  {id:'fr',    ico:'🔥', nm:'RAPID FIRE', desc:'Fire rate +14%.',             fn:p=>{p.char={...p.char,fr:p.char.fr*.86};}},
  {id:'range', ico:'📡', nm:'LONG SHOT',  desc:'Range +20%.',                 fn:p=>{p.char={...p.char,range:p.char.range*1.2,bs:p.char.bs*1.08};}},
  {id:'grenade',ico:'💢',nm:'FRAG ROUND', desc:'On kill: small explosion.',   fn:p=>{p.frag=true;}},
];
function pickUpgrades(n=3){
  const pool=[...UPGRADES],out=[];
  while(out.length<n&&pool.length) out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
  return out;
}

// ═══ THEMES ═══
const THEMES=[
  {nm:'Cactus Canyon', bg:'#1e1208',fl:'#2e1e12',gr:'rgba(255,180,80,.032)',wl:'#7a5230',wt:'#9e6a3e',bs:'#3a6028',bd:'#234018'},
  {nm:'Frost Bay',     bg:'#081018',fl:'#10202e',gr:'rgba(80,160,255,.03)', wl:'#2a4a6e',wt:'#4a7aaa',bs:'#246050',bd:'#184038'},
  {nm:'Neon Alley',    bg:'#0a0818',fl:'#140e22',gr:'rgba(160,80,255,.038)',wl:'#461e68',wt:'#7240a8',bs:'#581868',bd:'#380e48'},
  {nm:'Jungle Pit',    bg:'#081008',fl:'#102010',gr:'rgba(60,180,60,.03)',  wl:'#326018',wt:'#507830',bs:'#287018',bd:'#164808'},
  {nm:'Ash Wastes',    bg:'#141008',fl:'#1e1810',gr:'rgba(220,160,80,.025)',wl:'#583020',wt:'#8a5038',bs:'#483010',bd:'#2e1e08'},
  {nm:'Blood Pit',     bg:'#180606',fl:'#200e0e',gr:'rgba(255,40,40,.032)',  wl:'#641818',wt:'#a02828',bs:'#401010',bd:'#280808'},
  {nm:'Crystal Caves', bg:'#060e18',fl:'#0e1828',gr:'rgba(60,180,255,.035)',wl:'#183850',wt:'#307890',bs:'#143860',bd:'#0c2640'},
  {nm:'Volcano Core',  bg:'#180800',fl:'#221008',gr:'rgba(255,100,0,.032)',  wl:'#6a2808',wt:'#a84818',bs:'#402008',bd:'#2a1008'},
];

// ═══ RNG ═══
function rng32(s){return()=>{s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

// ═══ LEVEL BUILDER ═══
function buildLevel(idx){
  const th=THEMES[(idx-1)%THEMES.length];
  const r=rng32(7777+idx*211);
  const walls=[],bushes=[];
  [[0,0,W.w,T],[0,W.h-T,W.w,T],[0,0,T,W.h],[W.w-T,0,T,W.h]].forEach(([x,y,w,h])=>walls.push({x,y,w,h}));
  const wn=22+idx*2;
  for(let i=0;i<wn;i++){
    const ww=(1+Math.floor(r()*3))*T,wh=(1+Math.floor(r()*2))*T;
    const wx=T*2+Math.floor(r()*((W.w-ww-T*4)/T))*T;
    const wy=T*2+Math.floor(r()*((W.h-wh-T*4)/T))*T;
    if(Math.hypot(wx+ww/2-W.w/2,wy+wh/2-W.h/2)<260) continue;
    walls.push({x:wx,y:wy,w:ww,h:wh});
  }
  for(let i=0;i<28+Math.floor(r()*8);i++){
    const bw=(1+Math.floor(r()*2))*T,bh=(1+Math.floor(r()*2))*T;
    const bx=T*2+Math.floor(r()*((W.w-bw-T*4)/T))*T;
    const by=T*2+Math.floor(r()*((W.h-bh-T*4)/T))*T;
    if(Math.hypot(bx+bw/2-W.w/2,by+bh/2-W.h/2)<150) continue;
    let ok=true;
    for(const w of walls) if(bx<w.x+w.w&&bx+bw>w.x&&by<w.y+w.h&&by+bh>w.y){ok=false;break;}
    if(ok) bushes.push({x:bx,y:by,w:bw,h:bh});
  }
  return{th,walls,bushes,totalWaves:4+Math.floor((idx-1)*.55),idx};
}

// ═══ COLLISION ═══
function rCirc(rx,ry,rw,rh,cx,cy,cr){return Math.hypot(cx-Math.max(rx,Math.min(cx,rx+rw)),cy-Math.max(ry,Math.min(cy,ry+rh)))<cr;}
function hitWalls(cx,cy,cr){for(const w of GS.walls) if(rCirc(w.x,w.y,w.w,w.h,cx,cy,cr)) return true; return false;}
function tryMv(e,mx,my){
  if(mx){const nx=Math.max(e.r,Math.min(W.w-e.r,e.x+mx));if(!hitWalls(nx,e.y,e.r))e.x=nx;}
  if(my){const ny=Math.max(e.r,Math.min(W.h-e.r,e.y+my));if(!hitWalls(e.x,ny,e.r))e.y=ny;}
}
function inBush(x,y){for(const b of GS.bushes) if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h) return true; return false;}
function losOK(ax,ay,bx,by){
  const dx=bx-ax,dy=by-ay,d=Math.hypot(dx,dy),steps=Math.max(5,Math.floor(d/26));
  for(let i=1;i<steps;i++){const t=i/steps,x=ax+dx*t,y=ay+dy*t;for(const w of GS.walls) if(x>=w.x&&x<=w.x+w.w&&y>=w.y&&y<=w.y+w.h) return false;}
  return true;
}
function findCover(e,px,py){
  let best=null,bs=-Infinity;
  for(const w of GS.walls){
    const c=[{x:w.x-e.r-8,y:w.y+w.h/2},{x:w.x+w.w+e.r+8,y:w.y+w.h/2},{x:w.x+w.w/2,y:w.y-e.r-8},{x:w.x+w.w/2,y:w.y+w.h+e.r+8}];
    for(const p2 of c){
      if(p2.x<T+4||p2.x>W.w-T-4||p2.y<T+4||p2.y>W.h-T-4) continue;
      if(hitWalls(p2.x,p2.y,e.r+3)) continue;
      const sc=(!losOK(p2.x,p2.y,px,py)?240:20)-Math.hypot(p2.x-e.x,p2.y-e.y)*.4+Math.hypot(p2.x-px,p2.y-py)*.06;
      if(sc>bs){bs=sc;best=p2;}
    }
  }
  return best;
}

// ═══ PLAYER ACTIONS ═══
function doHeal(){
  if(!GS||GS.over||GS.upgrading) return;
  const p=GS.player;
  if(inBush(p.x,p.y)){ftext(p.x,p.y-46,'NO HEALING IN BUSHES','#ff3a5c',12,.95);return;}
  if(p.hp>=p.maxHp) return;
  p.healing=true;
}
function doShield(){
  if(!GS||GS.over||GS.upgrading) return;
  const p=GS.player;
  if(p.shCool>0||p.shActive||p.healing) return;
  p.shActive=true;p.shHits=0;p.shCool=10;
}
function doDash(){
  if(!GS||GS.over||GS.upgrading) return;
  const p=GS.player;
  if(p.dashCool>0||p.dashing||p.healing) return;
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup']) dy-=1;
  if(keys['s']||keys['arrowdown']) dy+=1;
  if(keys['a']||keys['arrowleft']) dx-=1;
  if(keys['d']||keys['arrowright']) dx+=1;
  dx+=joy.x; dy+=joy.y;
  if(!dx&&!dy){dx=Math.cos(p.angle);dy=Math.sin(p.angle);}
  const m=Math.hypot(dx,dy)||1;
  p.dashVx=dx/m*800;p.dashVy=dy/m*800;
  p.dashing=true;p.dashT=.17;p.dashCool=p.dashBase||4;
  p.dashTrail=[];
  burst(p.x,p.y,16,p.char.color,170,.38,3);
}

// ═══ FIRE ═══
function pFire(p){
  if(p.healing||p.dashing||p.ammo<=0||p.cool>0) return;
  const ch=p.char,dmg=ch.dmg*(p.dmgMul||1)*(p.dmgBoost>0?1.75:1);
  for(let i=0;i<ch.pellets;i++){
    const a=p.angle+(Math.random()-.5)*ch.spread;
    GS.buls.push({x:p.x+Math.cos(a)*p.r,y:p.y+Math.sin(a)*p.r,vx:Math.cos(a)*ch.bs,vy:Math.sin(a)*ch.bs,life:ch.range/ch.bs,dmg,from:'p',col:p.char.color,r:5,trail:[],pi:p.pierce||0,hit:[]});
  }
  p.cool=ch.fr;p.ammo--;p.lastFired=GS.t;p.muzzle=.09;
  if(p.reloadT<=0) p.reloadT=ch.reload;
  // casing
  const ca=p.angle+Math.PI/2+(Math.random()-.5)*.4;
  particle(p.x+Math.cos(ca)*13,p.y+Math.sin(ca)*13,Math.cos(ca)*62+Math.cos(p.angle)*20,Math.sin(ca)*62+Math.sin(p.angle)*20,.42,'#c8a840',2);
}
function eFire(e,px,py){
  const sp=e.role==='sniper'?.016:e.role==='berserk'?.17:.10;
  const a=Math.atan2(py-e.y,px-e.x)+(Math.random()-.5)*sp;
  const dmg=e.dmg*(e.rage?1.55:1)*(e.isBoss&&e.bPhase===3?1.45:1);
  GS.buls.push({x:e.x+Math.cos(a)*e.r,y:e.y+Math.sin(a)*e.r,vx:Math.cos(a)*e.bs,vy:Math.sin(a)*e.bs,life:e.range/e.bs,dmg,from:'e',col:e.col,r:e.isBoss?8:e.role==='sniper'?7:5,trail:[],pi:0,hit:[]});
  e.cool=e.fr*(e.rage?.60:1);
}

// ═══ WAVE ═══
function spawnWave(){
  GS.wave++;
  if(GS.wave>GS.totalWaves){
    GS.level++;
    const ld=buildLevel(GS.level);
    Object.assign(GS,ld);
    GS.wave=0;GS.waveActive=false;GS.betweenT=5;
    const p=GS.player;
    p.hp=Math.min(p.maxHp,p.hp+60);p.ammo=p.maxAmmo;p.x=W.w/2;p.y=W.h/2;
    banner(`LEVEL ${GS.level} CLEARED`,'+60 HP  •  AMMO RESTORED','#ffd34d',3200);
    spawnPU();spawnPU();spawnPU();
    giveXP(130);
    return;
  }
  GS.waveActive=true;
  const isBoss=GS.wave===GS.totalWaves;
  const lvl=GS.level-1,wv=GS.wave;
  const count=3+GS.wave+Math.floor(GS.level*.92);
  const enems=[];
  if(isBoss){
    const b=mkEnemy('boss',0,0,lvl,wv);b.maxHp=b.hp;enems.push(b);
    for(let i=1;i<count;i++){const e=mkEnemy('grunt',0,0,lvl,wv);e.maxHp=e.hp;enems.push(e);}
  } else {
    for(let i=0;i<count;i++){
      const roll=Math.random();
      let role;
      if(GS.level<=1||roll<.34) role='grunt';
      else if(roll<.55) role='flanker';
      else if(roll<.70) role='sniper';
      else if(roll<.84) role='berserk';
      else role='elite';
      const e=mkEnemy(role,0,0,lvl,wv);e.maxHp=e.hp;enems.push(e);
    }
  }
  for(const e of enems){
    let tr=0;
    do{const a=Math.random()*Math.PI*2,d=460+Math.random()*420;e.x=GS.player.x+Math.cos(a)*d;e.y=GS.player.y+Math.sin(a)*d;e.x=Math.max(95,Math.min(W.w-95,e.x));e.y=Math.max(95,Math.min(W.h-95,e.y));tr++;}
    while(tr<30&&hitWalls(e.x,e.y,e.r+5));
    GS.enems.push(e);
  }
  if(isBoss) banner('★  BOSS  WAVE  ★','Kill the boss to clear this level','#ff3a5c',3400);
  else banner(`WAVE  ${GS.wave} / ${GS.totalWaves}`,`${count} enemies incoming`,'#ffd34d');
  updBossBar();
}
function updBossBar(){
  const boss=GS.enems.find(e=>e.isBoss);
  document.getElementById('boss-wrap').style.display=boss?'block':'none';
}

function animMBG(){

    mbctx.beginPath();mbctx.arc(p.x,p.y,p.r,0,Math.PI*2);

function startGame(){
  cancelAnimationFrame(mbRaf);
  document.getElementById('menu').style.display='none';
  document.getElementById('death').classList.remove('on');
  document.getElementById('upg').classList.remove('on');
  document.getElementById('boss-wrap').style.display='none';
  const ch=CHARS[SEL];
  const ld=buildLevel(1);
  GS={
    t:0,score:0,kills:0,
    streak:0,streakT:0,
    combo:0,comboT:0,lastKillT:-9,
    level:1,wave:0,waveActive:false,betweenT:3.5,
    upgrading:false,over:false,
    player:{
      x:W.w/2,y:W.h/2,r:19,
      hp:ch.hp,maxHp:ch.hp,char:{...ch},
      ammo:ch.ammo,maxAmmo:ch.ammo,reloadT:0,cool:0,
      healing:false,
      shActive:false,shHits:0,shCool:0,shMaxHits:2,
      dashCool:0,dashing:false,dashVx:0,dashVy:0,dashT:0,dashTrail:[],dashBase:4,
      spdBoost:0,dmgBoost:0,
      angle:0,lastFired:-99,lastHit:-99,muzzle:0,
      spdMul:1,dmgMul:1,pierce:0,leech:0,frag:false,
      plvl:1,xp:0,xpNeed:100,
    },
    buls:[],enems:[],pus:[],pts:[],txts:[],
    cam:{x:0,y:0},
    ...ld,
  };
  banner('BRAWL ARENA','Survive the waves','#ffd34d',2800);
  last=performance.now();
  requestAnimationFrame(gameLoop);
}

function gameOver(){
  GS.over=true;shake(15);
  setTimeout(()=>{
    const d=document.getElementById('death');
    d.classList.add('on');
    document.getElementById('d-stats').innerHTML=
      `LEVEL ${GS.level}  ·  WAVE ${GS.wave}/${GS.totalWaves}<br>SCORE  ${GS.score.toLocaleString()}  ·  KILLS  ${GS.kills}<br>BRAWLER LVL  ${GS.player.plvl}`;
  },500);
}

// ═══ MAIN LOOP ═══
let last=performance.now();
function gameLoop(){
  const now=performance.now();
  const dt=Math.min((now-last)/1000,.05);last=now;
  if(!GS.upgrading) update(dt);
  render();
  if(!GS.over) requestAnimationFrame(gameLoop);
}

// ═══════════════════════ UPDATE ═══════════════════════
function update(dt){
  const s=GS,p=s.player;
  s.t+=dt;
  if(s.streak>0){s.streakT-=dt;if(s.streakT<=0)s.streak=0;}
  if(s.combo>0){s.comboT-=dt;if(s.comboT<=0)s.combo=0;}
  if(camShake.t>0){camShake.t=Math.max(0,camShake.t-dt);if(camShake.t<=0)camShake.p=0;}

  // Dash
  if(p.dashing){
    p.dashT-=dt;
    const nx=Math.max(p.r,Math.min(W.w-p.r,p.x+p.dashVx*dt));
    const ny=Math.max(p.r,Math.min(W.h-p.r,p.y+p.dashVy*dt));
    if(!hitWalls(nx,p.y,p.r))p.x=nx;
    if(!hitWalls(p.x,ny,p.r))p.y=ny;
    p.dashTrail.push({x:p.x,y:p.y,a:.55});
    if(Math.random()<.55) particle(p.x+(Math.random()-.5)*6,p.y+(Math.random()-.5)*6,0,0,.16,p.char.color,3);
    if(p.dashT<=0)p.dashing=false;
  }

  // Heal (cannot heal in bushes)
  if(p.healing){
    if(inBush(p.x,p.y)){
      p.healing=false;
      ftext(p.x,p.y-46,'NO HEALING IN BUSHES','#ff3a5c',11,.9);
    } else {
      p.hp=Math.min(p.maxHp,p.hp+30*dt);
      if(Math.random()<dt*15) particle(p.x+(Math.random()-.5)*p.r*2,p.y+(Math.random()-.5)*p.r*2,(Math.random()-.5)*18,-28,.5,'#3ec46d',2);
      if(p.hp>=p.maxHp)p.healing=false;
    }
  } else if(!p.dashing){
    let mx=0,my=0;
    if(keys['w']||keys['arrowup'])my-=1;if(keys['s']||keys['arrowdown'])my+=1;
    if(keys['a']||keys['arrowleft'])mx-=1;if(keys['d']||keys['arrowright'])mx+=1;
    mx+=joy.x;my+=joy.y;
    const m=Math.hypot(mx,my);if(m>0){mx/=m;my/=m;}
    const spd=p.char.spd*(p.spdMul||1)*(p.spdBoost>0?1.62:1);
    tryMv(p,mx*spd*dt,my*spd*dt);
  }

  // Aim
  if(!p.healing){const sx=aim.x+s.cam.x,sy=aim.y+s.cam.y;p.angle=Math.atan2(sy-p.y,sx-p.x);}

  // Timers
  if(p.spdBoost>0)p.spdBoost=Math.max(0,p.spdBoost-dt);
  if(p.dmgBoost>0)p.dmgBoost=Math.max(0,p.dmgBoost-dt);
  if(p.shCool>0)p.shCool=Math.max(0,p.shCool-dt);
  if(p.dashCool>0)p.dashCool=Math.max(0,p.dashCool-dt);
  if(p.muzzle>0)p.muzzle=Math.max(0,p.muzzle-dt);
  if(p.reloadT>0&&p.ammo<p.maxAmmo){p.reloadT-=dt;if(p.reloadT<=0){p.ammo++;p.reloadT=p.ammo<p.maxAmmo?p.char.reload:0;}}
  p.cool-=dt;

  // Fire — space bar fires (not dash), mouse also fires
  if(!p.healing&&(mFire||tFire||keys[' '])) pFire(p);

  // ── BULLETS ──
  for(let i=s.buls.length-1;i>=0;i--){
    const b=s.buls[i];
    b.trail.push({x:b.x,y:b.y});if(b.trail.length>5)b.trail.shift();
    b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
    if(b.life<=0||b.x<0||b.y<0||b.x>W.w||b.y>W.h){s.buls.splice(i,1);continue;}
    let wHit=false;
    for(const w of s.walls) if(b.x>=w.x&&b.x<=w.x+w.w&&b.y>=w.y&&b.y<=w.y+w.h){wHit=true;break;}
    if(wHit){burst(b.x,b.y,7,'#ccc',110,.2,2);s.buls.splice(i,1);continue;}

    if(b.from==='p'){
      let hits=0;
      for(const e of s.enems){
        if(b.hit.includes(e)) continue;
        if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+b.r){
          e.hp-=b.dmg;e.aggro=6;e.flashT=.14;e.aiState='approach';e.lkx=p.x;e.lky=p.y;
          if(e.hp/e.maxHp<.28&&!e.rage&&e.role!=='sniper'){e.rage=true;e.rageT=5.5;}
          burst(b.x,b.y,6,e.col,100,.33,2.5);
          ftext(b.x,b.y,Math.round(b.dmg),p.dmgBoost>0?'#ff5555':'#fff',11);
          b.hit.push(e);hits++;
          if(hits>b.pi) break;
        }
      }
      if(hits>0&&hits>b.pi){s.buls.splice(i,1);continue;}
    } else {
      if(!p.dashing&&Math.hypot(b.x-p.x,b.y-p.y)<p.r+b.r){
        let dmg=b.dmg;
        if(p.shActive){dmg*=(p.shHits===0?.1:.5);p.shHits++;if(p.shHits>=(p.shMaxHits||2))p.shActive=false;}
        p.hp-=dmg;p.lastHit=s.t;
        shake(4+dmg*.22);
        burst(b.x,b.y,5,'#ff3a5c',88,.28,2.5);
        ftext(b.x,b.y,'-'+Math.round(dmg),'#ff3a5c',12);
        s.buls.splice(i,1);
        if(p.hp<=0){p.hp=0;gameOver();}
        continue;
      }
    }
  }

  // ── ENEMY AI ──
  const pHid=inBush(p.x,p.y)&&(s.t-p.lastFired>.78)&&(s.t-p.lastHit>2.4);

  for(let i=s.enems.length-1;i>=0;i--){
    const e=s.enems[i];
    const dpx=p.x-e.x,dpy=p.y-e.y,dp=Math.hypot(dpx,dpy);
    const vr=e.role==='sniper'?760:600;
    const canSee=!pHid&&dp<vr&&losOK(e.x,e.y,p.x,p.y);
    e.seesP=canSee;
    if(canSee){e.aggro=5.8;e.lkx=p.x;e.lky=p.y;}
    e.aggro=Math.max(0,e.aggro-dt);
    const knows=e.aggro>0;
    e.stT=Math.max(0,e.stT-dt);
    e.flashT=Math.max(0,e.flashT-dt);
    e.staggerT=Math.max(0,e.staggerT-dt);
    if(e.rage){e.rageT-=dt;if(e.rageT<=0)e.rage=false;
      if(Math.random()<dt*10) particle(e.x+(Math.random()-.5)*e.r*2,e.y+(Math.random()-.5)*e.r*2,(Math.random()-.5)*50,(Math.random()-.5)*50,.28,e.col,2);}

    if(knows&&e.staggerT<=0){
      const hp=e.hp/e.maxHp;

      // Seek cover when low
      if(hp<.27&&e.aiState!=='cover'&&e.stT<=0&&!e.isBoss){
        const cv=findCover(e,e.lkx,e.lky);
        if(cv){e.cover=cv;e.aiState='cover';e.cvDone=false;e.stT=4.5+Math.random()*2;}
      }
      if(e.aiState==='cover'&&e.stT<=0){e.aiState='approach';e.cover=null;}

      if(e.role==='grunt'){
        if(e.aiState!=='cover'){
          const ideal=205+Math.sin(s.t+i*2.2)*55;
          const dir=dp>ideal+45?1:dp<ideal-45?-.45:0;
          const sx=Math.cos(s.t*1.25+i*2.1)*42,sy2=Math.sin(s.t*.92+i*1.85)*42;
          const tx=e.lkx+sx-e.x,ty=e.lky+sy2-e.y,tm=Math.hypot(tx,ty)||1;
          if(dir!==0) tryMv(e,tx/tm*e.spd*dir*dt,ty/tm*e.spd*dir*dt);
        }
      } else if(e.role==='flanker'){
        if(e.aiState!=='cover'){
          e.flkT-=dt;
          if(e.flkT<=0){e.flkA+=Math.PI*(.36+Math.random()*.26)*(Math.random()<.5?1:-1);e.flkT=1.05+Math.random()*.95;}
          const id=180+Math.random()*52;
          const tx=e.lkx+Math.cos(e.flkA)*id,ty=e.lky+Math.sin(e.flkA)*id;
          const fdx=tx-e.x,fdy=ty-e.y,fm=Math.hypot(fdx,fdy)||1;
          tryMv(e,fdx/fm*e.spd*dt,fdy/fm*e.spd*dt);
        }
      } else if(e.role==='sniper'){
        if(e.aiState!=='cover'){
          const id=500;
          if(dp<id-95){
            const cv=findCover(e,e.lkx,e.lky);
            if(cv){const cd=Math.hypot(cv.x-e.x,cv.y-e.y)||1;tryMv(e,(cv.x-e.x)/cd*e.spd*dt,(cv.y-e.y)/cd*e.spd*dt);}
            else tryMv(e,-dpx/dp*e.spd*dt,-dpy/dp*e.spd*dt);
          } else if(dp>id+95){tryMv(e,dpx/dp*e.spd*.48*dt,dpy/dp*e.spd*.48*dt);}
          else {const px=-dpy/dp,py=dpx/dp,sd=Math.sign(Math.sin(s.t*.52+i));tryMv(e,px*sd*e.spd*.52*dt,py*sd*e.spd*.52*dt);}
        }
        e.lcOn=e.cool<=e.fr*.58&&canSee&&dp<e.range;
        e.lcCharge=e.lcOn?Math.max(0,1-e.cool/(e.fr*.58)):0;
      } else if(e.role==='berserk'){
        e.chT-=dt;
        if(e.chT<=0&&dp<420&&canSee&&!e.charging){
          const a=Math.atan2(dpy,dpx);
          e.chVx=Math.cos(a)*330;e.chVy=Math.sin(a)*330;
          e.charging=true;e.chT=2.3+Math.random()*.9;
          burst(e.x,e.y,12,e.col,95,.42,2.5);
        }
        if(e.charging){
          const nx=Math.max(e.r,Math.min(W.w-e.r,e.x+e.chVx*dt));
          const ny=Math.max(e.r,Math.min(W.h-e.r,e.y+e.chVy*dt));
          if(!hitWalls(nx,e.y,e.r))e.x=nx; else{e.chVx*=-.62;burst(e.x,e.y,5,'#fff',80,.22,2);}
          if(!hitWalls(e.x,ny,e.r))e.y=ny; else e.chVy*=-.62;
          e.chVx*=Math.pow(.06,dt);e.chVy*=Math.pow(.06,dt);
          if(Math.hypot(e.chVx,e.chVy)<20)e.charging=false;
          // Melee damage on charge
          if(dp<e.r+p.r+6&&!p.dashing){
            p.hp-=e.dmg*.75;p.lastHit=s.t;shake(6);
            ftext(p.x,p.y-40,'-'+Math.round(e.dmg*.75),'#ff3a5c',12);
            if(p.hp<=0){p.hp=0;gameOver();}
            e.staggerT=.3;e.charging=false;
          }
        } else if(e.aiState!=='cover'){
          if(dp>115)tryMv(e,dpx/dp*e.spd*dt,dpy/dp*e.spd*dt);
        }
      } else if(e.role==='elite'){
        if(e.aiState!=='cover'){
          if(dp>165)tryMv(e,dpx/dp*e.spd*1.06*dt,dpy/dp*e.spd*1.06*dt);
          else{const px=-dpy/dp,py=dpx/dp;tryMv(e,px*e.spd*.92*dt,py*e.spd*.92*dt);}
        }
      } else if(e.role==='boss'){
        // Phase transitions
        if(hp<.66&&e.bPhase===1){e.bPhase=2;burst(e.x,e.y,26,e.col,230,.88,5.5);shake(12);}
        if(hp<.33&&e.bPhase===2){e.bPhase=3;burst(e.x,e.y,32,'#fff',250,.95,5.5);shake(16);}
        const sp=e.spd*(1+(3-e.bPhase)*.09)*(e.rage?1.22:1);
        if(dp>138)tryMv(e,dpx/dp*sp*dt,dpy/dp*sp*dt);
        else{const px=-dpy/dp,py=dpx/dp;tryMv(e,px*sp*dt,py*sp*dt);}
        // Summon minions
        e.bSummonT-=dt;
        if(e.bSummonT<=0&&hp<.78){
          e.bSummonT=11-e.bPhase*1.9;
          for(let k=0;k<e.bPhase;k++){
            const ne=mkEnemy('grunt',e.x+(Math.random()-.5)*220,e.y+(Math.random()-.5)*220,GS.level-1,GS.wave);
            ne.maxHp=ne.hp;GS.enems.push(ne);
          }
          ftext(e.x,e.y-52,'SUMMONING!',e.col,13,.9);
        }
        // Phase 3: tri-shot
        if(e.bPhase===3&&e.cool<=0&&canSee){
          for(let k=-1;k<=1;k++){const a=Math.atan2(dpy,dpx)+k*.24;GS.buls.push({x:e.x,y:e.y,vx:Math.cos(a)*e.bs,vy:Math.sin(a)*e.bs,life:e.range/e.bs,dmg:e.dmg*1.4,from:'e',col:e.col,r:8,trail:[],pi:0,hit:[]});}
          e.cool=e.fr;
        }
        // Phase 2+: rapid burst (extra shot pattern)
        if(e.bPhase>=2&&e.cool<=0&&canSee&&dp<e.range&&e.bPhase<3){eFire(e,p.x,p.y);}
      }

      // Shared cover movement
      if(e.aiState==='cover'&&e.cover){
        const cdx=e.cover.x-e.x,cdy=e.cover.y-e.y,cm=Math.hypot(cdx,cdy)||1;
        if(cm>12)tryMv(e,cdx/cm*e.spd*dt,cdy/cm*e.spd*dt); else e.cvDone=true;
      }

      // Investigate
      if(!canSee&&knows){
        const ilx=e.lkx-e.x,ily=e.lky-e.y,im=Math.hypot(ilx,ily)||1;
        if(im>65)tryMv(e,ilx/im*e.spd*.46*dt,ily/im*e.spd*.46*dt);
      }
    } else if(!knows){
      const wa=Math.sin(s.t*.42+i*2.05)*.82;
      tryMv(e,Math.cos(wa)*e.spd*.09*dt,Math.sin(wa)*e.spd*.09*dt);
    }

    // Separation
    for(let j=i-1;j>=0;j--){
      const e2=s.enems[j];
      const ex=e.x-e2.x,ey=e.y-e2.y,ed=Math.hypot(ex,ey);
      const mn=e.r+e2.r+2;
      if(ed>0&&ed<mn){const k=(mn-ed)*.52;tryMv(e,ex/ed*k,ey/ed*k);tryMv(e2,-ex/ed*k,-ey/ed*k);}
    }

    // Fire
    e.cool-=dt*(e.rage?1.55:1);
    const inCovBlocked=e.aiState==='cover'&&e.cvDone&&!losOK(e.x,e.y,p.x,p.y);
    if(e.role!=='boss'||e.bPhase<2){
      if(e.cool<=0&&canSee&&dp<e.range&&!inCovBlocked) eFire(e,p.x,p.y);
    }

    // Death
    if(e.hp<=0){
      s.enems.splice(i,1);
      const pts=e.isBoss?650:e.isElite?300:e.role==='berserk'?145:100;
      const cm=1+Math.floor(s.combo*.18);
      s.kills++;s.score+=pts*cm;
      s.streak++;s.streakT=4.5;showStreak(s.streak);
      if(s.t-s.lastKillT<2.9)s.combo++;else s.combo=1;
      s.lastKillT=s.t;s.comboT=2.9;showCombo(s.combo,e.col);
      shake(e.isBoss?16:e.isElite?8:3.5);
      burst(e.x,e.y,e.isBoss?36:e.isElite?24:16,e.col,e.isBoss?260:200,e.isBoss?.95:.72,e.isBoss?6:3.5);
      if(e.isBoss)burst(e.x,e.y,20,'#fff',210,.88,4.5);
      ftext(e.x,e.y,e.isBoss?'BOSS SLAIN!':'+'+pts,e.isBoss?'#ff3a5c':e.isElite?'#ffd34d':'#fff',e.isBoss?18:13,.95);
      kfeed(e.isBoss?'★ BOSS SLAIN':e.isElite?`★ ELITE KILLED`:`${e.role.toUpperCase()} KILLED`,e.col);
      if(Math.random()<(e.isBoss?.92:e.isElite?.58:.22)) spawnPU(e.x,e.y);
      if(p.leech>0) p.hp=Math.min(p.maxHp,p.hp+p.leech);
      if(p.frag) burst(e.x,e.y,18,'#ff8a5b',140,.5,3);
      giveXP(e.isBoss?90:e.isElite?44:22);
      updBossBar();
    }
  }

  // Wave
  if(s.waveActive){
    if(s.enems.length===0){
      s.waveActive=false;s.betweenT=4.5;
      if(s.wave>=s.totalWaves) banner(`LEVEL ${s.level} CLEARED`,`Prepare for level ${s.level+1}…`,'#ffd34d',3200);
      else banner(`WAVE ${s.wave} CLEARED`,`Next wave in 4s`,'#5be0a8');
    }
  } else {s.betweenT-=dt;if(s.betweenT<=0)spawnWave();}

  // Powerups
  if(s.pus.length<7&&Math.random()<dt*.13) spawnPU();
  for(let i=s.pus.length-1;i>=0;i--){
    const pu=s.pus[i];pu.life-=dt;pu.bt+=dt*3;
    if(pu.life<=0){s.pus.splice(i,1);continue;}
    if(Math.hypot(pu.x-p.x,pu.y-p.y)<pu.r+p.r){applyPU(pu);s.pus.splice(i,1);}
  }

  // Particles
  for(let i=s.pts.length-1;i>=0;i--){
    const pa=s.pts[i];
    pa.x+=pa.vx*dt;pa.y+=pa.vy*dt;
    pa.vx*=Math.pow(.06,dt);pa.vy*=Math.pow(.06,dt);
    pa.vy+=52*dt;
    pa.life-=dt;if(pa.life<=0)s.pts.splice(i,1);
  }
  for(let i=s.txts.length-1;i>=0;i--){const t=s.txts[i];t.y+=t.vy*dt;t.life-=dt;if(t.life<=0)s.txts.splice(i,1);}

  // Camera (smooth)
  const tcx=p.x-innerWidth/2,tcy=p.y-innerHeight/2;
  s.cam.x+=(tcx-s.cam.x)*Math.min(1,dt*9);
  s.cam.y+=(tcy-s.cam.y)*Math.min(1,dt*9);
  s.cam.x=Math.max(0,Math.min(W.w-innerWidth,s.cam.x));
  s.cam.y=Math.max(0,Math.min(W.h-innerHeight,s.cam.y));

  // Dash trail decay
  if(p.dashTrail)for(let i=p.dashTrail.length-1;i>=0;i--){p.dashTrail[i].a-=dt*3.2;if(p.dashTrail[i].a<=0)p.dashTrail.splice(i,1);}
}

// ═══════════════════════ RENDER ═══════════════════════
function render(){
  const s=GS;if(!s)return;
  const cam=s.cam,th=s.th,p=s.player,iW=innerWidth,iH=innerHeight;

  // Screen shake
  let sx=0,sy=0;
  if(camShake.t>0){const si=camShake.p*(camShake.t/.22);sx=(Math.random()-.5)*si*2.4;sy=(Math.random()-.5)*si*2.4;}

  ctx.clearRect(0,0,iW,iH);
  ctx.save();ctx.translate(sx,sy);

  // Background
  ctx.fillStyle=th.bg;ctx.fillRect(-cam.x,-cam.y,W.w,W.h);
  ctx.fillStyle=th.fl;ctx.fillRect(-cam.x+T,-cam.y+T,W.w-T*2,W.h-T*2);

  // Grid
  ctx.strokeStyle=th.gr;ctx.lineWidth=.7;
  for(let gx=0;gx<=W.w;gx+=T){ctx.beginPath();ctx.moveTo(gx-cam.x,-cam.y);ctx.lineTo(gx-cam.x,W.h-cam.y);ctx.stroke();}
  for(let gy=0;gy<=W.h;gy+=T){ctx.beginPath();ctx.moveTo(-cam.x,gy-cam.y);ctx.lineTo(W.w-cam.x,gy-cam.y);ctx.stroke();}

  // ── Bushes ──
  for(const b of s.bushes){
    const bx=b.x-cam.x,by=b.y-cam.y;
    ctx.fillStyle=th.bd;ctx.fillRect(bx,by,b.w,b.h);
    ctx.fillStyle=th.bs;
    const cols=Math.ceil(b.w/24),rows=Math.ceil(b.h/24);
    for(let c=0;c<cols;c++)for(let r=0;r<rows;r++){ctx.beginPath();ctx.arc(bx+c*24+15,by+r*24+15,13,0,Math.PI*2);ctx.fill();}
    // No-heal indicator
    ctx.strokeStyle='rgba(255,40,40,.14)';ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(bx+b.w/2-5,by+b.h/2);ctx.lineTo(bx+b.w/2+5,by+b.h/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(bx+b.w/2,by+b.h/2-5);ctx.lineTo(bx+b.w/2,by+b.h/2+5);ctx.stroke();
  }

  // ── Walls ──
  for(const w of s.walls){
    const wx=w.x-cam.x,wy=w.y-cam.y;
    ctx.fillStyle=th.wl;ctx.fillRect(wx,wy,w.w,w.h);
    ctx.fillStyle=th.wt;ctx.fillRect(wx,wy,w.w,8);
    ctx.fillStyle='rgba(0,0,0,.2)';ctx.fillRect(wx+w.w-4,wy+8,4,w.h-8);ctx.fillRect(wx,wy+w.h-4,w.w,4);
    ctx.strokeStyle='rgba(0,0,0,.38)';ctx.lineWidth=1.3;ctx.strokeRect(wx,wy,w.w,w.h);
  }

  // ── Powerups ──
  for(const pu of s.pus){
    const px2=pu.x-cam.x,py2=pu.y-cam.y+Math.sin(pu.bt)*4.5;
    const pulse=.5+.5*Math.sin(s.t*5+pu.bt);
    ctx.globalAlpha=.18+.18*pulse;ctx.strokeStyle=pu.col;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(px2,py2,pu.r+9+pulse*5,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
    ctx.save();ctx.translate(px2,py2);ctx.shadowBlur=18;ctx.shadowColor=pu.col;
    ctx.fillStyle=pu.col;ctx.beginPath();ctx.arc(0,0,pu.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,.92)';ctx.font='bold 13px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(pu.ico,0,1);ctx.restore();
  }

  // ── Enemies ──
  for(const e of s.enems){
    const ex=e.x-cam.x,ey=e.y-cam.y;
    const inB=inBush(e.x,e.y);
    ctx.globalAlpha=inB?.24:1;
    if(e.rage||e.isBoss){ctx.shadowBlur=e.isBoss?22:14;ctx.shadowColor=e.col;}
    ctx.fillStyle=e.flashT>0?'#fff':e.col;
    ctx.beginPath();ctx.arc(ex,ey,e.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(0,0,0,.42)';ctx.lineWidth=2;ctx.stroke();

    if(e.isElite&&!e.isBoss){
      ctx.globalAlpha=inB?.18:.60;ctx.strokeStyle=e.col;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(ex,ey,e.r+5+Math.sin(s.t*3)*2,0,Math.PI*2);ctx.stroke();
    }
    if(e.isBoss){
      ctx.globalAlpha=inB?.1:(.42+.42*Math.sin(s.t*4));ctx.strokeStyle=e.col;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(ex,ey,e.r+7+Math.sin(s.t*3)*3,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.arc(ex,ey,e.r+14+Math.sin(s.t*2.4+1)*4,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=inB?.12:1;
      ctx.fillStyle='rgba(255,255,255,.65)';ctx.font=`bold 8px 'Courier New',monospace`;ctx.textAlign='center';
      ctx.fillText('P'+e.bPhase,ex,ey+e.r+20);
    }
    if(e.charging){ctx.globalAlpha=inB?.12:.52;ctx.strokeStyle='#ff8a5b';ctx.lineWidth=3;ctx.beginPath();ctx.arc(ex,ey,e.r+9,0,Math.PI*2);ctx.stroke();}

    // Sniper laser
    if(e.lcOn&&!inB){
      const ta=Math.atan2(p.y-e.y,p.x-e.x);
      ctx.globalAlpha=e.lcCharge*.48;ctx.strokeStyle='#7ab9ff';ctx.lineWidth=.8+e.lcCharge*2.2;ctx.setLineDash([3,8]);
      ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex+Math.cos(ta)*e.range,ey+Math.sin(ta)*e.range);ctx.stroke();ctx.setLineDash([]);
    }

    ctx.globalAlpha=inB?.38:1;
    const bw=e.r*2+10;
    ctx.fillStyle='rgba(0,0,0,.65)';ctx.fillRect(ex-bw/2,ey-e.r-13,bw,4);
    ctx.fillStyle=e.hp/e.maxHp>.5?e.col:'#ff3a5c';ctx.fillRect(ex-bw/2,ey-e.r-13,bw*(e.hp/e.maxHp),4);
    if(e.rage){ctx.fillStyle='rgba(255,120,0,.48)';ctx.fillRect(ex-bw/2,ey-e.r-19,bw*(e.rageT/5.5),2);}
    ctx.globalAlpha=1;
  }

  // ── Bullets ──
  for(const b of s.buls){
    if(b.trail.length>1){
      ctx.save();ctx.globalAlpha=.28;ctx.strokeStyle=b.col;ctx.lineWidth=b.r*.8;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(b.trail[0].x-cam.x,b.trail[0].y-cam.y);
      for(let k=1;k<b.trail.length;k++)ctx.lineTo(b.trail[k].x-cam.x,b.trail[k].y-cam.y);
      ctx.stroke();ctx.restore();
    }
    ctx.shadowBlur=9;ctx.shadowColor=b.col;ctx.fillStyle=b.col;
    ctx.beginPath();ctx.arc(b.x-cam.x,b.y-cam.y,b.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  }

  // ── Player ──
  const ppx=p.x-cam.x,ppy=p.y-cam.y;
  const hidden=inBush(p.x,p.y)&&(s.t-p.lastFired>.78)&&(s.t-p.lastHit>2.4);

  // Dash trail
  if(p.dashTrail) for(const dt2 of p.dashTrail){ctx.globalAlpha=dt2.a*.55;ctx.fillStyle=p.char.color;ctx.beginPath();ctx.arc(dt2.x-cam.x,dt2.y-cam.y,p.r*.68,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;

  // Aim
  if(!p.healing){
    const rng=p.char.range;
    const rx=ppx+Math.cos(p.angle)*rng,ry=ppy+Math.sin(p.angle)*rng;
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.setLineDash([4,12]);ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(ppx,ppy);ctx.lineTo(rx,ry);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(255,255,255,.025)';
    ctx.beginPath();ctx.moveTo(ppx,ppy);ctx.arc(ppx,ppy,rng,p.angle-p.char.spread,p.angle+p.char.spread);ctx.closePath();ctx.fill();
    const cc=p.ammo>0?p.char.color:'#333';
    ctx.strokeStyle=cc;ctx.lineWidth=1.5;ctx.shadowBlur=7;ctx.shadowColor=cc;
    ctx.beginPath();ctx.moveTo(rx-5,ry);ctx.lineTo(rx+5,ry);ctx.stroke();
    ctx.beginPath();ctx.moveTo(rx,ry-5);ctx.lineTo(rx,ry+5);ctx.stroke();
    ctx.beginPath();ctx.arc(rx,ry,3,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
  }

  // Muzzle flash
  if(p.muzzle>0){
    const f=p.muzzle/.09,mx2=ppx+Math.cos(p.angle)*(p.r+7),my2=ppy+Math.sin(p.angle)*(p.r+7);
    ctx.save();ctx.translate(mx2,my2);ctx.rotate(p.angle);ctx.shadowBlur=32;ctx.shadowColor=p.char.color;ctx.fillStyle='rgba(255,255,240,.96)';
    ctx.beginPath();for(let k=0;k<8;k++){const a2=k*Math.PI/4,rr=k%2===0?14*f:5.5*f;k===0?ctx.moveTo(Math.cos(a2)*rr,Math.sin(a2)*rr):ctx.lineTo(Math.cos(a2)*rr,Math.sin(a2)*rr);}
    ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.restore();
  }

  // Body
  ctx.globalAlpha=hidden?.32:p.dashing?.52:1;
  if(p.dashing){ctx.shadowBlur=20;ctx.shadowColor=p.char.color;}
  else if(p.shActive){ctx.shadowBlur=24;ctx.shadowColor='#3b9cff';}
  else if(p.spdBoost>0||p.dmgBoost>0){ctx.shadowBlur=10;ctx.shadowColor=p.char.color;}
  ctx.fillStyle=p.char.color;
  ctx.beginPath();ctx.arc(ppx,ppy,p.r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.82)';ctx.lineWidth=2.5;ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle='rgba(0,0,0,.52)';
  ctx.beginPath();ctx.arc(ppx+Math.cos(p.angle)*(p.r-5),ppy+Math.sin(p.angle)*(p.r-5),5,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  // Status rings
  if(p.shActive){
    const sc=p.shHits===0?'#3b9cff':'#a0d4ff';
    ctx.strokeStyle=sc;ctx.lineWidth=p.shHits===0?4:2;ctx.shadowBlur=15;ctx.shadowColor=sc;
    ctx.beginPath();ctx.arc(ppx,ppy,p.r+9+Math.sin(s.t*6),0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
  }
  if(p.healing){
    ctx.strokeStyle='#3ec46d';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(ppx,ppy,p.r+12+Math.sin(s.t*11)*3,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#3ec46d';ctx.font=`bold 10px 'Courier New',monospace`;ctx.textAlign='center';ctx.fillText('HEALING',ppx,ppy-41);
  }
  if(p.dmgBoost>0){ctx.strokeStyle='rgba(232,91,91,.42)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(ppx,ppy,p.r+19+Math.sin(s.t*7)*3,0,Math.PI*2);ctx.stroke();}
  if(p.spdBoost>0){ctx.strokeStyle='rgba(255,211,77,.32)';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(ppx,ppy,p.r+23+Math.sin(s.t*9)*4,0,Math.PI*2);ctx.stroke();}

  // HP bar
  const hpc=p.hp/p.maxHp;
  ctx.fillStyle='rgba(0,0,0,.48)';ctx.fillRect(ppx-28,ppy-37,56,6);
  ctx.fillStyle=hpc>.5?'#5be0a8':hpc>.25?'#ffd34d':'#ff3a5c';ctx.fillRect(ppx-28,ppy-37,56*hpc,6);
  if(hidden){ctx.fillStyle='#3ec46d';ctx.font=`bold 9px 'Courier New',monospace`;ctx.textAlign='center';ctx.fillText('HIDDEN',ppx,ppy-44);}

  // ── Particles ──
  for(const pa of s.pts){
    ctx.globalAlpha=Math.max(0,pa.life/pa.ml*.9);ctx.fillStyle=pa.col;
    ctx.beginPath();ctx.arc(pa.x-cam.x,pa.y-cam.y,pa.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // ── Floating texts ──
  for(const t of s.txts){
    ctx.globalAlpha=Math.min(1,t.life/t.ml*2);
    ctx.font=`bold ${t.sz||13}px 'Courier New',monospace`;ctx.textAlign='center';
    ctx.fillStyle=t.col;ctx.shadowBlur=9;ctx.shadowColor=t.col;
    ctx.fillText(t.txt,t.x-cam.x,t.y-cam.y);ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;

  // Wave countdown bar
  if(!s.waveActive&&s.betweenT>0){
    const mT=s.wave===0?3.5:4.5,pct=s.betweenT/mT;
    ctx.fillStyle='rgba(0,0,0,.48)';ctx.fillRect(iW/2-130,3,260,5);
    ctx.fillStyle='#ffd34d';ctx.fillRect(iW/2-130,3,260*pct,5);
  }

  ctx.restore();

  // ── Minimap ──
  const MW=132,MH=98,msx=MW/W.w,msy=MH/W.h;
  mctx.fillStyle='rgba(6,6,10,.92)';mctx.fillRect(0,0,MW,MH);
  mctx.fillStyle='rgba(65,65,88,.52)';
  for(const w of s.walls)mctx.fillRect(w.x*msx,w.y*msy,Math.max(1,w.w*msx),Math.max(1,w.h*msy));
  mctx.fillStyle='rgba(28,88,28,.52)';
  for(const b of s.bushes)mctx.fillRect(b.x*msx,b.y*msy,b.w*msx,b.h*msy);
  for(const e of s.enems){
    mctx.fillStyle=e.isBoss?'#ff3a5c':e.isElite?'#ffd34d':e.col;
    mctx.beginPath();mctx.arc(e.x*msx,e.y*msy,e.isBoss?4.5:2.5,0,Math.PI*2);mctx.fill();
  }
  mctx.fillStyle='#e8c25b';
  for(const pu of s.pus){mctx.beginPath();mctx.arc(pu.x*msx,pu.y*msy,1.8,0,Math.PI*2);mctx.fill();}
  mctx.shadowBlur=6;mctx.shadowColor=p.char.color;mctx.fillStyle='#fff';
  mctx.beginPath();mctx.arc(p.x*msx,p.y*msy,3.5,0,Math.PI*2);mctx.fill();mctx.shadowBlur=0;
  mctx.strokeStyle='rgba(255,255,255,.18)';mctx.lineWidth=1;mctx.strokeRect(cam.x*msx,cam.y*msy,iW*msx,iH*msy);
  mctx.strokeStyle='rgba(255,255,255,.1)';mctx.strokeRect(0,0,MW,MH);

  // ── HUD DOM ──
  const hpc2=p.hp/p.maxHp;
  document.getElementById('hp-val').textContent=Math.ceil(p.hp);
  document.getElementById('hp-fill').style.cssText=`width:${hpc2*100}%;background:${hpc2>.5?'linear-gradient(90deg,#3ec46d,#5be0a8)':hpc2>.25?'linear-gradient(90deg,#c07020,#ffd34d)':'linear-gradient(90deg,#a01212,#ff3a5c)'}`;
  document.getElementById('sh-fill').style.width=(p.shActive?(p.shHits===0?100:50):0)+'%';
  document.getElementById('xp-fill').style.width=(p.xp/p.xpNeed*100)+'%';
  document.getElementById('score-val').textContent=s.score.toLocaleString();
  document.getElementById('kills-val').textContent=s.kills;
  document.getElementById('char-lbl').textContent=p.char.name+(p.dmgBoost>0?' ●DMG':p.spdBoost>0?' ●SPD':'');
  document.getElementById('wv-info').textContent=`WAVE ${Math.max(1,s.wave)}/${s.totalWaves} · ${s.th.nm.toUpperCase()}`;
  document.getElementById('lvl-badge').textContent=`BRAWLER LVL ${p.plvl}`;
  document.getElementById('streak-lbl').textContent=s.streak>1?`🔥 ${s.streak}× STREAK`:'';

  // Pips
  let ph='';
  for(let i=0;i<p.maxAmmo;i++){ph+=`<div class="pip${i<p.ammo?' on':i===p.ammo&&p.ammo<p.maxAmmo?' bl':''}"></div>`;}
  document.getElementById('pips').innerHTML=ph;

  // Ability row
  const abls=[{ico:'⚕',key:'H',cd:0,max:0,act:p.healing,col:'#3ec46d'},{ico:'🛡',key:'E',cd:p.shCool,max:10,act:p.shActive,col:'#3b9cff'},{ico:'💨',key:'F',cd:p.dashCool,max:p.dashBase||4,act:p.dashing,col:'#ffd34d'}];
  document.getElementById('abil-row').innerHTML=abls.map(a=>`<div class="ab"><div class="ab-box ${a.act?'act':a.cd<=0?'rdy':''}" style="--ac:${a.col}">${a.ico}${a.cd>0?`<div class="ab-cd">${Math.ceil(a.cd)}</div>`:''}</div><div class="ab-key">${a.key}</div></div>`).join('');

  // Boss bar
  const boss=s.enems.find(e=>e.isBoss);
  if(boss){
    document.getElementById('boss-bar').style.width=(boss.hp/boss.maxHp*100)+'%';
    document.getElementById('boss-nm').textContent=`★ BOSS · PHASE ${boss.bPhase} · ${Math.ceil(boss.hp)} HP`;
    document.getElementById('boss-phases').innerHTML='<div class="bph on"></div>'.repeat(boss.bPhase)+'<div class="bph"></div>'.repeat(3-boss.bPhase);
  }

  // Countdown
  const cdEl=document.getElementById('cdwn');
  if(!s.waveActive&&s.betweenT>0){cdEl.textContent=`NEXT WAVE IN ${Math.ceil(s.betweenT)}s`;cdEl.style.opacity='1';}
  else cdEl.style.opacity='0';

  // Touch CDs
  document.getElementById('tc-h').textContent=p.healing?'…':'';
  document.getElementById('tc-e').textContent=p.shCool>0?Math.ceil(p.shCool):'';
  document.getElementById('tc-f').textContent=p.dashCool>0?Math.ceil(p.dashCool):'';
}
</script>
</body>
</html>
